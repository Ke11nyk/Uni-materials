{t:"Логіки 1-го порядку (предикатів). Мова арифметики. Виразність. Істинність, виконуваність, логічний наслідок, логічна еквівалентність.",b:[
"<strong>Мова ЛПП</strong>: предметні змінні, предикатні символи Pⁿ, функціональні символи fⁿ, константи, квантори ∀, ∃, з'єднувачі ¬,∧,∨,→,↔.",

{t:"Еквівалентні перетворення формул. Пренексна нормальна форма. Скулемівська стандартна форма.",b:[

[
{t:"Поняття алгоритму. Оцінка ефективності. Функції складності. Асимптотична складність.",b:[
"<strong>Функція складності за часом T(n)</strong>: кількість базових операцій на вході розміру n (зазвичай гірший випадок). <strong>За пам'яттю S(n)</strong>: додаткова пам'ять.",
"<strong>Асимптотичні позначення:</strong> <em>O(f)</em> — верхня межа: ∃c,n₀: T(n)≤c·f(n) при n≥n₀. <em>Ω(f)</em> — нижня: T(n)≥c·f(n). <em>Θ(f)</em> — точна: і O, і Ω. <em>o(f)</em> / <em>ω(f)</em> — строгі варіанти.",
"Порядок: O(1) &lt; O(log n) &lt; O(√n) &lt; O(n) &lt; O(n log n) &lt; O(n²) &lt; O(n³) &lt; O(2ⁿ) &lt; O(n!).",
"Правила: сума — береться більший клас; добуток — множаться; сталий множник відкидається.",
"Аналіз: для циклів — підсумовування; для рекурсії — рекурентні співвідношення."
]},
{t:"Аналіз нерекурсивних та рекурсивних алгоритмів. Декомпозиція «розділяй та владарюй». Рекурентні співвідношення.",b:[
"<strong>Нерекурсивний аналіз</strong>: підрахунок операцій у вкладених циклах (правило добутку/суми).",
"<strong>Принцип «розділяй та владарюй»</strong>: розбити задачу на a підзадач розміру n/b, вирішити рекурсивно, об'єднати за D(n). T(n) = aT(n/b) + D(n).",
"<strong>Метод підстановки</strong>: вгадати T(n)=O(f(n)), перевірити індукцією.",
"<strong>Дерево рекурсії</strong>: намалювати рівні, сумувати роботу на кожному рівні.",
"<strong>Основний метод (Master Theorem)</strong> для T(n)=aT(n/b)+f(n), a≥1, b>1:",
"  <em>Випадок 1</em>: f(n)=O(n^(log_b a−ε)) → T=Θ(n^(log_b a))",
"  <em>Випадок 2</em>: f(n)=Θ(n^(log_b a)) → T=Θ(n^(log_b a)·log n)",
"  <em>Випадок 3</em>: f(n)=Ω(n^(log_b a+ε)) і ∃c<1: af(n/b)≤cf(n) → T=Θ(f(n))",
"Приклади: merge sort T=2T(n/2)+n → Case 2 → Θ(n log n); бінарний пошук T=T(n/2)+1 → Case 2 → Θ(log n)."
]},
{t:"Амортизаційний аналіз.",b:[
"Метод аналізу послідовності n операцій, де окремі операції можуть бути дорогими, але загальна вартість — O(n).",
"<strong>Метод агрегату</strong>: загальна вартість T(n) операцій / n = амортизована вартість однієї.",
"<strong>Метод обліку (бухгалтерський)</strong>: кожній операції призначаємо «амортизовану вартість» ĉᵢ ≥ cᵢ. Надлишок (ĉᵢ−cᵢ) зберігається як «кредит» для майбутніх дорогих операцій. Умова: сума кредитів ≥ 0 завжди.",
"<strong>Потенціальний метод</strong>: Φ(Dᵢ) — потенціал стану. Амортизована вартість ĉᵢ = cᵢ + Φ(Dᵢ) − Φ(Dᵢ₋₁). Якщо Φ(Dₙ) ≥ Φ(D₀), то Σcᵢ ≤ Σĉᵢ.",
"<strong>Приклад — динамічний масив</strong>: при заповненні — копіювання O(n), але amortized push_back = O(1), бо подвоєння відбувається рідко.",
"<strong>Приклад — splay tree</strong>: окремі операції O(n), але amortized O(log n) per operation."
]},
{t:"Швидкі алгоритми множення (Карацуба, Штрассен).",b:[
"<strong>Наївне множення n-цифрових чисел</strong>: O(n²).",
"<strong>Алгоритм Карацуби (1960)</strong>: x=x₁·Bᵐ+x₀, y=y₁·Bᵐ+y₀. Ідея: x·y = x₁y₁·B²ᵐ + ((x₁+x₀)(y₁+y₀) − x₁y₁ − x₀y₀)·Bᵐ + x₀y₀ — 3 рекурсивних множення замість 4. T(n)=3T(n/2)+O(n) → Case 1 → <strong>O(n^log₂3) ≈ O(n^1.585)</strong>.",
"<strong>Алгоритм Штрассена (1969)</strong>: множення матриць 2×2 за <strong>7 множень</strong> замість 8 (8 додавань). Рекурсивно: <strong>O(n^log₂7) ≈ O(n^2.807)</strong> для n×n матриць.",
"На практиці: Карацуба ефективний від ~70 цифр. Штрассен — від ~100×100. Для великих задач — алгоритми Тума-Кука, Шенгаге-Штрассена (FFT)."
]},
{t:"Алгоритми сортування та їх ефективність.",b:[
"<strong>Insertion sort</strong>: O(n²) серед./гірш., O(n) кращ. Стабільне, in-place. Ефективне для майже відсортованих або малих масивів.",
"<strong>Selection sort</strong>: O(n²) завжди. Нестабільне, in-place. Мінімум обмінів.",
"<strong>Bubble sort</strong>: O(n²) серед. Стабільне, in-place. Практично не використовується.",
"<strong>Heap sort</strong>: O(n log n) завжди. Нестабільне, in-place. Build-heap O(n), потім n разів extract-max O(log n).",
"<strong>Quick sort</strong>: O(n log n) середній, O(n²) гірший (при поганому pivot). Нестабільне, in-place. Randomized quicksort — O(n log n) expected.",
"<strong>Merge sort</strong>: O(n log n) завжди. Стабільне, O(n) доп. пам'яті. Ідеальне для linked lists.",
"<strong>Нижня межа</strong> для порівняльного сортування: Ω(n log n) — з дерева рішень (2^(≥n·log n) листків).",
"<strong>Counting sort</strong>: O(n+k), k — діапазон. <strong>Radix sort</strong>: O(d(n+k)), d — цифр. <strong>Bucket sort</strong>: O(n) expected для рівномірного розподілу."
]},
{t:"Лінійні динамічні структури. Списки, стеки, черги. Черги з пріоритетами. Купи.",b:[
"<strong>Однозв'язний список</strong>: вузол = (data, next). Вставка/видалення на початок O(1), пошук O(n), доступ по індексу O(n).",
"<strong>Двозв'язний список</strong>: (prev, data, next). Видалення відомого вузла O(1). Більше пам'яті.",
"<strong>Стек (LIFO)</strong>: push/pop/top — O(1). Реалізація — масив або список. Застосування: DFS, виклики функцій, парсинг виразів.",
"<strong>Черга (FIFO)</strong>: enqueue/dequeue — O(1). Кільцевий масив або список. Застосування: BFS, буферизація.",
"<strong>Черга з пріоритетом</strong>: extract-min/max + insert. Абстрактна структура.",
"<em>Бінарна купа (heap)</em>: повне бінарне дерево у масиві, батько &lt; дитини (min-heap). insert O(log n), extract-min O(log n), build O(n). Індексація: лівий нащадок 2i, правий 2i+1.",
"<em>Біноміальна купа</em>: колекція біноміальних дерев B₀,B₁,… Merge O(log n), insert O(1) amortized.",
"<em>Піраміда Фібоначчі</em>: decrease-key O(1) amortized, extract-min O(log n) amortized. Оптимальна для Дейкстри → O(E+V log V)."
]},
{t:"Нелінійні структури. Дерева. Представлення та обходи. Рекурсивні та ітеративні алгоритми.",b:[
"<strong>Дерево</strong>: зв'язний ациклічний граф. Корінь, листки, глибина (відстань від кореня), висота (макс. глибина листка).",
"<strong>Представлення</strong>: масив дочірніх вузлів; «перша дитина – наступний сиблінг» (economical); масив для повного дерева (i → 2i (ліво), 2i+1 (право), ⌊i/2⌋ (батько)).",
"<strong>Inorder (LNR)</strong>: ліве дерево, корінь, праве. Для BST → відсортований порядок.",
"<strong>Preorder (NLR)</strong>: корінь першим. Серіалізація, копіювання.",
"<strong>Postorder (LRN)</strong>: корінь останнім. Видалення дерева, обчислення виразів.",
"<strong>Рівневий (BFS)</strong>: черга, зліва направо.",
"<strong>Ітеративний обхід</strong>: явний стек (уникає stack overflow для глибоких дерев). Для inorder: push всі ліві, потім обробляємо і йдемо праворуч."
]},
{t:"Дерева бінарного пошуку (BST). Збалансовані дерева. Червоно-чорні дерева. B-дерева.",b:[
"<strong>BST</strong>: ліве піддерево < корінь < праве. Search/insert/delete O(h), h — висота. Вироджене (sorted input) → h=n.",
"<strong>AVL-дерево</strong>: |height(L)−height(R)| ≤ 1 у кожному вузлі. Ротації (одинарна/подвійна) при дисбалансі. h = O(log n).",
"<strong>Червоно-чорне дерево (RB-tree)</strong>: 5 правил: (1) кожен вузол — червоний або чорний; (2) корінь — чорний; (3) NIL-листки — чорні; (4) діти червоного — чорні; (5) всі шляхи root→NIL мають однакову кількість чорних вузлів. h ≤ 2·log₂(n+1). Insert/delete/search — O(log n). <code>std::map</code> у C++ — RB-tree.",
"<strong>B-дерево (Bayer & McCreight, 1972)</strong>: вузол має від t−1 до 2t−1 ключів (t — мін. ступінь). Всі листки на одній глибині h=O(log_t n). O(log n) операцій, але O(t) пам'яті per node. Ефективний для дискових систем. <strong>B⁺-дерево</strong>: дані лише у листках, листки пов'язані між собою. Стандарт у СУБД."
]},
{t:"Хешування і хеш-таблиці. Методи розв'язання колізій.",b:[
"<strong>Хеш-таблиця</strong>: масив розміру m, ключ k → h(k) ∈ [0,m−1]. Avg O(1) для insert/search/delete за умови рівномірного хешування.",
"<strong>Хеш-функції</strong>: метод ділення h(k)=k mod m (m — просте); метод множення h(k)=⌊m·(k·A mod 1)⌋, A≈0.618; Universal hashing — випадкова функція з сімейства → O(1) expected навіть для adversarial input.",
"<strong>Ланцюжкове хешування (chaining)</strong>: кожен слот — список. Пошук O(1+α), α=n/m — фактор завантаження. Допустимий α>1.",
"<strong>Відкрита адресація</strong>: всі елементи в таблиці, α<1 обов'язково. <em>Лінійне зондування</em>: h(k,i)=(h(k)+i) mod m — первинна кластеризація. <em>Квадратичне</em>: (h(k)+c₁i+c₂i²) mod m. <em>Подвійне хешування</em>: (h₁(k)+i·h₂(k)) mod m — найкраще розсіювання.",
"<strong>Rehashing</strong>: при α>0.75 (typical) — нова таблиця вдвічі більша, перехешування всіх елементів → amortized O(1) per insert."
]},
{t:"Алгоритми пошуку рядка: Боєр-Мур (Хорспул), КМП, Ахо-Корасік, Рабін-Карп.",b:[
"<strong>КМП (Кнут-Морріс-Пратт)</strong>: prefix-function π[i] — довжина найдовшого власного суфіксу = префіксу. Будується за O(m). Пошук O(n) — ніколи не відкочується назад по тексту.",
"<strong>Боєр-Мур</strong>: два евристики — <em>bad character</em> (зсув по поганому символу) і <em>good suffix</em>. Найшвидший на практиці для довгих патернів. O(n/m) кращий випадок, O(nm) гірший без preprocessing.",
"<strong>Хорспул</strong>: спрощений БМ — лише bad character з правого символу вікна. Простіший, але близький за практичною ефективністю.",
"<strong>Ахо-Корасік</strong>: пошук набору з k патернів одночасно. Будує trie + failure links (як КМП для trie). O(Σm_i) — побудова, O(n + кількість входжень) — пошук.",
"<strong>Рабін-Карп</strong>: поліноміальне хешування вікна тексту, ковзаючий хеш O(1) перераховується. O(n+m) avg, O(nm) worst. Зручний для k рівних патернів."
]},
{t:"Динамічне програмування. Жадібні алгоритми.",b:[
"<strong>Динамічне програмування (ДП)</strong>: застосовне коли є <em>оптимальна підструктура</em> (оптимальне рішення містить оптимальні підрішення) і <em>перекриваючі підзадачі</em>.",
"<em>Top-down (мемоізація)</em>: рекурсія + кеш результатів. <em>Bottom-up (таблиця)</em>: заповнення в правильному порядку.",
"Класичні задачі ДП: LCS (O(mn)), LIS (O(n log n) з binary search), задача про рюкзак (O(nW)), множення матриць (O(n³)), редакційна відстань (O(mn)), найдовший спільний підрядок, монетна задача.",
"<strong>Жадібні алгоритми</strong>: робимо локально оптимальний вибір на кожному кроці. Потребують доведення: <em>властивість жадібного вибору</em> (локальний оптимум входить до глобального) + <em>оптимальна підструктура</em>.",
"Класичні жадібні: розклад активностей (interval scheduling), код Гаффмана (O(n log n)), MST — Прим і Крускал, Дейкстра, задача про покриття (жадібна — не завжди оптимальна для NP-задач)."
]},
{t:"Графи, їх представлення. Обходи. Найкоротші шляхи. Мінімальне кістякове дерево.",b:[
"<strong>Представлення</strong>: матриця суміжності O(V²) пам'яті — для щільних графів; список суміжності O(V+E) — для розріджених.",
"<strong>BFS</strong>: черга, рівневий обхід, знаходить найкоротший шлях у незваженому графі. O(V+E). Застосування: shortest path, bipartite check.",
"<strong>DFS</strong>: стек/рекурсія. O(V+E). Топологічне сортування (reverse finish order), пошук SCC (Косарайю або Тарян), мости та точки зчленування.",
"<strong>Дейкстра</strong>: найкоротші шляхи від одного джерела, невід'ємні ваги. З binary heap O((V+E) log V). З Fibonacci heap O(E+V log V).",
"<strong>Беллман-Форд</strong>: від'ємні ребра допустимі, виявляє від'ємні цикли. O(VE).",
"<strong>Floyd-Warshall</strong>: всі пари шляхів. O(V³), DP по проміжних вузлах.",
"<strong>Kruskall</strong>: сортування ребер + union-find. O(E log E).",
"<strong>Prim</strong>: жадібне розширення дерева, min-heap. O(E log V)."
]}
],
[
{t:"Об'єкти та класи. Поля та методи. Статичні поля та методи.",b:[
"<strong>Клас</strong>: шаблон/тип, що описує стан (поля) та поведінку (методи). <strong>Об'єкт</strong>: конкретний екземпляр класу в пам'яті.",
"<strong>Поля (data members)</strong>: зберігають стан об'єкта. <strong>Методи (member functions)</strong>: операції. Нестатичний метод отримує прихований параметр <code>this</code>.",
"<strong>Статичні поля</strong>: одна копія на клас (не на об'єкт). Ініціалізуються поза класом у .cpp. Приклад використання: лічильник екземплярів, спільний кеш.",
"<strong>Статичні методи</strong>: не мають <code>this</code>, не мають доступу до нестатичних полів. Виклик: <code>ClassName::method()</code>. Приклад: factory-метод."
]},
{t:"Життєвий цикл об'єкта. Конструктори та деструктори. Stack vs Heap.",b:[
"<strong>Конструктор</strong>: ініціалізує об'єкт, викликається автоматично при створенні. Може бути перевантажений. Список ініціалізації (<code>: field_(x)</code>) — виконується до тіла конструктора, ефективніший для const і reference полів.",
"<strong>Деструктор</strong>: ~ClassName() — викликається автоматично. Для класів, що управляють ресурсами — обов'язковий.",
"<strong>Stack (автоматичне сховище)</strong>: об'єкт знищується при виході зі scope. Швидко (інкремент SP), фіксований розмір стека.",
"<strong>Heap (динамічне сховище)</strong>: <code>new</code>/<code>delete</code> (C++), GC (Java/C#). Гнучкий розмір, але повільніше (malloc), треба управляти вручну або через smart pointers.",
"<strong>Порядок</strong>: конструкція — бази у порядку оголошення → поля → тіло. Деструкція — зворотний порядок."
]},
{t:"Інкапсуляція. Модифікатори доступу.",b:[
"<strong>Інкапсуляція</strong>: приховування деталей реалізації, надання стабільного інтерфейсу. Зменшує зв'язність, спрощує зміни.",
"<strong>public</strong>: доступний звідусіль. <strong>protected</strong>: доступний у класі та підкласах. <strong>private</strong>: лише в класі та <code>friend</code>.",
"У C++ за замовчуванням у <code>class</code> — private, у <code>struct</code> — public.",
"Java: ще <em>package-private</em> (без модифікатора) — доступний у пакеті. Python: конвенції <code>_private</code>, <code>__name_mangling</code>.",
"<strong>Геттери/сеттери</strong>: контрольований доступ до private-полів з можливістю валідації."
]},
{t:"Успадкування. Базові класи. Віртуальні методи. Абстрактні класи. Чи бувають конструктори/деструктори віртуальними?",b:[
"<strong>Успадкування</strong>: <code>class Dog : public Animal</code>. Dog отримує всі public/protected члени Animal. Відношення is-a.",
"<strong>Базовий клас</strong>: надає default-реалізацію, нащадок може перевизначити (<code>override</code>).",
"<strong>Віртуальний метод</strong>: <code>virtual void f()</code> — вирішення виклику під час виконання через vtable (таблиця вказівників на методи, vptr у кожному об'єкті).",
"<strong>Чисто віртуальний</strong>: <code>virtual void f() = 0</code> — клас стає абстрактним, екземпляри не створити.",
"<strong>Чи бувають конструктори віртуальними?</strong> — <strong>Ні</strong>. Під час конструювання тип об'єкта ще не повністю визначений, vtable не заповнена. Поліморфне «конструювання» реалізується через Factory Method або clone().",
"<strong>Деструктори</strong> — <strong>обов'язково virtual</strong> у поліморфних базових класах. Без цього <code>delete base_ptr</code> викличе лише ~Base() → витік ресурсів нащадка (UB)."
]},
{t:"Поліморфізм. Статичний та динамічний. Динамічний на основі ієрархії.",b:[
"<strong>Поліморфізм</strong>: «один інтерфейс — різні реалізації».",
"<strong>Статичний (compile-time)</strong>: перевантаження функцій (overloading), шаблони. Вирішується компілятором — zero runtime overhead.",
"<strong>Динамічний (runtime)</strong>: virtual-методи + vtable. Base-pointer/reference → виклик методу конкретного типу нащадка. Мінімальний overhead (1 indirect call).",
"Механізм vtable: кожен клас з virtual-методами має власну vtable. Об'єкт зберігає vptr → vtable. Виклик: <code>(*obj->vptr[idx])(obj, args)</code>.",
"Приклад: <code>Animal* a = new Dog(); a->speak();</code> → Dog::speak() якщо speak() — virtual."
]},
{t:"Шаблони (templates/generics). Статичний поліморфізм.",b:[
"<strong>Шаблони функцій</strong>: <code>template&lt;typename T&gt; T max(T a, T b)</code>. Компілятор генерує конкретну версію (instantiation) для кожного типу T.",
"<strong>Шаблони класів</strong>: <code>template&lt;typename T&gt; class Stack</code>. Кожна комбінація параметрів — окрема генерована версія.",
"<strong>Специфікація шаблону</strong>: повна або часткова спеціалізація для конкретних типів.",
"<strong>CRTP (Curiously Recurring Template Pattern)</strong>: <code>class Derived : public Base&lt;Derived&gt;</code> — статичний поліморфізм без vtable, zero overhead.",
"<strong>Концепти (C++20)</strong>: <code>template&lt;typename T&gt; requires Sortable&lt;T&gt;</code> — статична перевірка вимог до типу T."
]},
{t:"Успадкування інтерфейсу та реалізації. Public/private успадкування. Успадкування vs композиція.",b:[
"<strong>Public успадкування (is-a)</strong>: Dog is-a Animal. Інтерфейс та реалізація бази доступні публічно. Клієнт може використовувати нащадка як базу.",
"<strong>Private успадкування (implemented-in-terms-of)</strong>: деталь реалізації, не відношення is-a. Інтерфейс бази прихований. Альтернатива приватній композиції.",
"<strong>Protected успадкування</strong>: публічні члени бази стають protected у нащадку.",
"<strong>using</strong>: відновлення видимості методів при приватному успадкуванні.",
"<strong>Композиція (has-a)</strong>: клас містить об'єкт іншого класу як поле. Слабший зв'язок — легше змінювати реалізацію. <em>Prefer composition over inheritance</em>.",
"Успадкування — коли is-a відношення семантично правильне, потрібен поліморфізм або override."
]},
{t:"Множинне успадкування. Diamond problem. Віртуальне успадкування.",b:[
"<strong>Множинне успадкування</strong>: <code>class C : public A, public B</code>. C++ підтримує, Java — лише інтерфейси.",
"<strong>Diamond problem</strong>: D → B → A та D → C → A. D містить два екземпляри A → неоднозначність при доступі до членів A.",
"<strong>Розв'язання — virtual inheritance</strong>: <code>class B : virtual public A</code>, <code>class C : virtual public A</code>. D матиме один спільний екземпляр A. Overhead: додатковий vbase-pointer.",
"Альтернатива: уникати diamond через рефакторинг — винести загальний функціонал в окрему не-успадковану залежність, або через pure interfaces."
]},
{t:"Керування пам'яттю. Проблеми. RAII. Smart pointers.",b:[
"<strong>Проблеми ручного управління</strong>: memory leak (забули delete), dangling pointer (вказівник на вже звільнену пам'ять), double-free (два рази delete), use-after-free → UB.",
"<strong>RAII (Resource Acquisition Is Initialization)</strong>: ресурс захоплюється в конструкторі, звільняється в деструкторі. Деструктор викликається автоматично при виході зі scope або при виключенні.",
"<strong>unique_ptr&lt;T&gt;</strong>: єдиний власник, некопійований, переміщуваний. <code>std::make_unique&lt;T&gt;(args)</code>. Zero overhead vs raw pointer.",
"<strong>shared_ptr&lt;T&gt;</strong>: спільне володіння через reference counting. Знищується при count=0. Overhead: атомарний лічильник.",
"<strong>weak_ptr&lt;T&gt;</strong>: не збільшує refcount, перевіряємо через <code>lock()</code>. Запобігає циклічним посиланням між shared_ptr."
]},
{t:"Механізми обробки помилок. Exceptions. Assert. Алгебраїчні типи даних.",b:[
"<strong>assert(cond)</strong>: перевіряє інваріант у debug-режимі, вимикається в release через NDEBUG. Для програмних помилок (порушення передумов).",
"<strong>Exceptions (throw/try/catch)</strong>: stack unwinding — при throw деструктори всіх об'єктів у scope викликаються автоматично (RAII!). Для виключних ситуацій (файл не знайдено, мережева помилка). <code>noexcept</code> — гарантія відсутності виключень → оптимізація.",
"<strong>std::optional&lt;T&gt;</strong>: значення або nullopt. Для функцій, що можуть «не повернути» результат.",
"<strong>std::variant&lt;T,E&gt;</strong>: sum type. <strong>std::expected&lt;T,E&gt;</strong> (C++23): Ok(T) або Err(E) — повернення помилки без виключення.",
"У Rust: <code>Result&lt;T,E&gt;</code>, <code>Option&lt;T&gt;</code> — компілятор змушує обробляти помилки."
]},
{t:"Системи контролю версій.",b:[
"<strong>VCS</strong>: зберігають повну історію змін, забезпечують паралельну розробку та відновлення.",
"<strong>Централізовані (CVCS)</strong>: SVN, Perforce — єдиний центральний сервер. Простіша концепція, але залежність від сервера та мережі.",
"<strong>Розподілені (DVCS)</strong>: Git, Mercurial — кожен клон є повним репозиторієм. Робота offline, швидші локальні операції.",
"<strong>Git концепції</strong>: working tree → index (staging) → commit. Об'єкти: blob (файл), tree (директорія), commit, tag. Branch — легкий вказівник на commit. HEAD — поточна гілка.",
"<strong>Workflow</strong>: feature branch → PR/MR → code review → merge/rebase. Rebase — лінійна історія, merge — зберігає структуру гілок.",
"<strong>Переваги</strong>: blame, bisect, stash, reflog, підписані теги. <strong>Недоліки</strong>: складна крива навчання, складні конфлікти при злитті."
]},
{t:"Тестування коду. Модульні тести. Фреймворки для тестування.",b:[
"<strong>Рівні тестування</strong>: unit → integration → system → acceptance (UAT).",
"<strong>Unit tests</strong>: ізольоване тестування найменшої одиниці (функція, метод, клас). Властивості: <em>F</em>ast, <em>I</em>solated, <em>R</em>epeatable, <em>S</em>elf-validating, <em>T</em>imely (FIRST).",
"<strong>AAA-патерн</strong>: Arrange (підготовка стану) → Act (виклик) → Assert (перевірка результату).",
"<strong>Mock</strong>: перевіряє виклики методів. <strong>Stub</strong>: повертає фіксовані дані. <strong>Fake</strong>: спрощена реалізація (in-memory DB). Ізолюють тест від залежностей.",
"<strong>Фреймворки</strong>: C++ — Google Test (gtest), Catch2; Java — JUnit 5, Mockito; Python — pytest; JS/TS — Jest, Vitest.",
"<strong>TDD</strong>: Red (написати failing тест) → Green (мінімальний код) → Refactor.",
"<strong>Code coverage</strong>: statement, branch, path coverage. 100% не гарантує відсутність багів — тести мають бути значущими."
]},
{t:"Документування коду. Doxygen.",b:[
"Коментарі пояснюють <em>що</em> і <em>навіщо</em>, не <em>як</em> (код сам пояснює як).",
"<strong>Doxygen</strong>: генерує HTML/PDF/LaTeX з анотованого C/C++/Java/Python коду. Спеціальні теги: <code>@brief</code>, <code>@param[in/out] name</code>, <code>@return</code>, <code>@throws</code>, <code>@note</code>, <code>@warning</code>, <code>@see</code>, <code>@code ... @endcode</code>.",
"Стилі коментарів: <code>/// однорядковий</code> або <code>/** ... */</code> блоковий.",
"<strong>Javadoc</strong> (Java), <strong>Sphinx/docstrings</strong> (Python), <strong>TSDoc</strong> (TypeScript) — аналоги.",
"Принципи: документувати публічний API обов'язково; уникати очевидного; підтримувати актуальність при рефакторингу."
]},
{t:"Моделювання програмних систем. Мова UML. Основні типи діаграм.",b:[
"<strong>UML (Unified Modeling Language)</strong>: стандарт OMG для візуального моделювання ПЗ. Версія UML 2.x.",
"<strong>Структурні діаграми</strong>: Class diagram (класи та відношення), Component (архітектурні компоненти), Deployment (розміщення на вузлах), Package, Object (конкретні екземпляри).",
"<strong>Поведінкові діаграми</strong>: Use Case (актори і сценарії), Activity (потоки управління, паралелізм), State Machine (стани та переходи), Sequence (повідомлення між lifelines у часі), Communication, Timing.",
"<strong>Відношення у Class diagram</strong>: association (→), aggregation (◇→ ціле-частина, частина існує незалежно), composition (◆→ ціле-частина, частина не існує без цілого), dependency (- -→), generalization/inheritance (—△), realization (- -△).",
"Sequence diagram: вертикальні lifelines, горизонтальні стрілки-повідомлення, активаційні прямокутники, фрагменти alt/loop/opt."
]},
{t:"Основні принципи розробки. KISS, DRY, абстракції.",b:[
"<strong>KISS (Keep It Simple, Stupid)</strong>: найпростіше рішення — найкраще. Складність ускладнює розуміння, тестування та підтримку.",
"<strong>DRY (Don't Repeat Yourself)</strong>: кожна одиниця знання має єдине авторитетне представлення. Дублювання → неконсистентні зміни при рефакторингу.",
"<strong>YAGNI (You Aren't Gonna Need It)</strong>: не додавати функціонал «на майбутнє» — тільки те, що потрібно зараз.",
"<strong>Principle of Least Astonishment</strong>: поведінка системи не має дивувати — API має бути передбачуваним.",
"<strong>Separation of Concerns</strong>: різні аспекти — різні модулі (UI відокремлено від бізнес-логіки від персистентності).",
"<strong>Принцип абстракції</strong>: приховувати деталі за стабільним інтерфейсом. Рівні абстракції не мають змішуватись."
]},
{t:"Принципи SOLID.",b:[
"<strong>S — Single Responsibility Principle</strong>: клас/модуль має одну причину для зміни. Кожен клас відповідає за один аспект системи.",
"<strong>O — Open/Closed Principle</strong>: відкритий для розширення, закритий для модифікації. Нова поведінка — через нові класи/реалізації, не через зміну існуючих.",
"<strong>L — Liskov Substitution Principle</strong>: об'єкт підтипу може замінити базовий тип без порушення коректності. Preconditions не посилюються, postconditions не послаблюються. Порушення: квадрат IS-A прямокутник, але setWidth ламає інваріант.",
"<strong>I — Interface Segregation Principle</strong>: краще багато специфічних інтерфейсів, ніж один загальний. Клієнт не повинен залежати від методів, які не використовує.",
"<strong>D — Dependency Inversion Principle</strong>: залежати від абстракцій, не від конкретних класів. High-level та low-level модулі обидва залежать від абстракції (інтерфейсу/абстрактного класу)."
]},
{t:"Патерни проєктування. Породжувальні, структурні, поведінкові.",b:[
"<strong>Породжувальні (Creational)</strong>: Singleton (один екземпляр, глобальна точка доступу); Factory Method (підклас вирішує, який об'єкт створити); Abstract Factory (сімейство взаємопов'язаних об'єктів); Builder (покроковий конструктор складних об'єктів); Prototype (клонування через clone()).",
"<strong>Структурні (Structural)</strong>: Adapter (несумісні інтерфейси); Bridge (відокремити абстракцію від реалізації); Composite (дерево об'єктів — однаковий інтерфейс для листка і гілки); Decorator (динамічне додавання функціональності); Facade (спрощений інтерфейс до підсистеми); Flyweight (поділ стану між об'єктами); Proxy (сурогат/посередник).",
"<strong>Поведінкові (Behavioral)</strong>: Observer (підписка на події); Strategy (взаємозамінні алгоритми); Command (інкапсуляція запиту як об'єкта); Iterator (послідовний обхід без розкриття структури); Template Method (алгоритм з кроками-гачками); State (поведінка залежить від стану); Chain of Responsibility; Mediator; Memento (знімок стану); Visitor."
]},
{t:"Паралельне мультипоточне програмування. Потоки vs процеси.",b:[
"<strong>Процес</strong>: ізольований адресний простір, власні ресурси (heap, стек, fd). Дороге перемикання контексту. Комунікація: IPC — pipe, socket, shared memory, message queue.",
"<strong>Потік (thread)</strong>: легковаговий, поділяє адресний простір процесу (heap, data). Кожен потік має власний стек та registers. Дешевше переключення. Спільна пам'ять → race conditions.",
"<strong>Переваги потоків</strong>: паралелізм на multicores, async I/O без блокування, responsiveness UI (окремий потік для рендерингу).",
"<strong>Проблеми</strong>: race condition (результат залежить від порядку виконання), deadlock (взаємне очікування), livelock, starvation, priority inversion."
]},
{t:"Створення та керування потоками.",b:[
"<strong>POSIX threads</strong>: <code>pthread_create(&t, attr, func, arg)</code>; <code>pthread_join(t, retval)</code>; <code>pthread_detach(t)</code>.",
"<strong>C++11 std::thread</strong>: <code>std::thread t(func, args...);</code>. <code>t.join()</code> — чекати завершення; <code>t.detach()</code> — відпустити (daemon). RAII-wrapper: <code>std::jthread</code> (C++20) — автоматично join.",
"<strong>Thread pool</strong>: пул N потоків обробляє чергу завдань. Уникає overhead створення/знищення потоків. C++: <code>std::async</code> (внутрішньо може використовувати пул), сторонні пули (BS::thread_pool).",
"<strong>std::async / std::future / std::promise</strong>: асинхронне виконання з отриманням результату через <code>future.get()</code>.",
"<strong>std::coroutine (C++20)</strong>: кооперативна багатозадачність без потоків — suspend/resume."
]},
{t:"Механізми синхронізації потоків (lock, mutex, condition variable).",b:[
"<strong>Mutex</strong>: mutual exclusion. <code>std::mutex m; m.lock(); ... m.unlock();</code>. Запобігає одночасному доступу. Рекурсивний mutex: <code>std::recursive_mutex</code>.",
"<strong>std::lock_guard&lt;std::mutex&gt;</strong>: RAII — автоматично unlock при виході зі scope. <strong>std::unique_lock</strong>: гнучкіший — defer_lock, try_lock, передача між потоками.",
"<strong>Deadlock</strong>: два потоки чекають на mutex один одного. Запобігання: (1) завжди захоплювати mutex в одному порядку; (2) <code>std::lock(m1, m2)</code> — атомарне захоплення двох без deadlock; (3) таймаут — <code>try_lock_for</code>.",
"<strong>Condition variable</strong>: <code>std::condition_variable cv;</code>. <code>cv.wait(lk, predicate)</code> — атомарно звільняє mutex і чекає. <code>cv.notify_one()</code> / <code>cv.notify_all()</code>. Spurious wakeup — тому предикат обов'язковий.",
"<strong>std::atomic&lt;T&gt;</strong>: атомарні read-modify-write без mutex. <code>fetch_add</code>, <code>compare_exchange</code>. Менший overhead для простих типів. Memory ordering: relaxed/acquire/release/seq_cst.",
"<strong>std::shared_mutex</strong> (C++17): множинні читачі або один письменник (readers-writer lock)."
]}
],
[
{t:"ER-модель.",b:[
"<strong>ER (Entity-Relationship) модель</strong> — Пітер Чен, 1976. Концептуальна модель для проєктування БД незалежно від СУБД.",
"<strong>Сутність (Entity)</strong>: об'єкт реального світу (Студент, Курс). Зображається прямокутником. <strong>Атрибут</strong>: властивість сутності (ПІБ, дата народження). Еліпс. Ключовий атрибут — підкреслено.",
"<strong>Зв'язок (Relationship)</strong>: асоціація між сутностями. Ромб. <strong>Кардинальність</strong>: 1:1, 1:N, M:N.",
"<strong>Слабка сутність</strong>: не має власного ключа, ідентифікується через зв'язок із сильною (подвійний прямокутник). Розрізнювач — штрихове підкреслення.",
"<strong>ER → реляційна схема</strong>: сутності → таблиці (атрибути → стовпці, ключ → PK); зв'язок 1:N → FK у таблиці N-сторони; зв'язок M:N → окрема таблиця з двома FK."
]},
{t:"Поняття БД, основні властивості.",b:[
"<strong>База даних (БД)</strong>: організована, постійна, спільно використовувана колекція пов'язаних даних, керована СУБД.",
"<strong>СУБД</strong>: програмний комплекс для визначення (DDL), зберігання, маніпулювання (DML) та захисту даних.",
"<strong>Основні властивості</strong>: цілісність (integrity constraints), незалежність даних (логічна — від застосунків; фізична — від зберігання), спільне використання (concurrency), відновлення після збоїв (ACID transactions), контроль доступу.",
"<strong>ANSI/SPARC архітектура — 3 рівні</strong>: зовнішній (view конкретного користувача) → концептуальний (логічна схема всіх даних) → внутрішній (фізичне зберігання, індекси)."
]},
{t:"Класифікація запитів.",b:[
"<strong>DDL (Data Definition Language)</strong>: CREATE TABLE, ALTER TABLE, DROP TABLE, CREATE INDEX — визначення та зміна схеми.",
"<strong>DML (Data Manipulation Language)</strong>: SELECT (вибірка), INSERT, UPDATE, DELETE — маніпулювання даними.",
"<strong>DCL (Data Control Language)</strong>: GRANT (надати права), REVOKE (відкликати) — управління доступом.",
"<strong>TCL (Transaction Control Language)</strong>: COMMIT, ROLLBACK, SAVEPOINT — керування транзакціями.",
"За складністю: прості (one-table SELECT), JOIN-запити (кілька таблиць), підзапити (subquery у WHERE/FROM/SELECT), агрегатні (GROUP BY + функції)."
]},
{t:"Реляційна модель Кодда. Реляційна алгебра.",b:[
"<strong>Реляційна модель</strong> (Е.Ф. Кодд, 1970): дані у вигляді відношень (таблиць). Рядок — кортеж, стовпець — атрибут, домен — тип.",
"<strong>Відношення</strong>: підмножина декартового добутку D₁×D₂×…×Dₙ. Схема: R(A₁:D₁, …, Aₙ:Dₙ). Порядок рядків не важливий. Дублікати відсутні (формально — множина кортежів).",
"<strong>Реляційна алгебра — операції:</strong>",
"  <em>σ (selection)</em>: σ[умова](R) — рядки, що задовольняють умову.",
"  <em>π (projection)</em>: π[A₁,…,Aₖ](R) — залишити вказані атрибути (видаляє дублікати).",
"  <em>× (Cartesian product)</em>: R × S — всі пари кортежів.",
"  <em>∪, ∩, \\ (set operations)</em>: для сумісних відношень (однакова схема).",
"  <em>⋈ (natural join)</em>: з'єднання по однакових атрибутах. <em>θ-join</em>: σ[умова](R × S). <em>equijoin</em>: θ-join з умовою рівності.",
"  <em>÷ (division)</em>: R ÷ S — кортежі R, пов'язані з усіма кортежами S. Для запитів типу «всі студенти, що здали всі іспити»."
]},
{t:"Реляційне числення. Мова ALPHA.",b:[
"<strong>Реляційне числення</strong>: декларативний підхід — описуємо що хочемо отримати, а не як. Два варіанти: числення кортежів (tuple calculus) і числення доменів (domain calculus).",
"<strong>Числення кортежів</strong>: {t | P(t)} — множина кортежів t таких, що предикат P(t) істинний. Де P містить квантори ∃ і ∀, предикати на атрибути, логічні з'єднувачі.",
"<strong>Мова ALPHA (Кодд)</strong>: перша практична мова на основі числення кортежів. Змінні-кортежі, GET (вибірка), PUT (вставка), HOLD/UPDATE/DELETE/DROP. Умови у WHERE-клаузі.",
"ALPHA → теоретична основа SQL. <strong>QUEL</strong> (Ingres) — практична реалізація числення кортежів. Числення доменів → QBE."
]},
{t:"Реляційна повнота. Теза Кодда.",b:[
"<strong>Реляційно повна мова</strong>: мова, виразова потужність якої не менша, ніж у реляційної алгебри. Може виразити всі запити, що виражає реляційна алгебра.",
"<strong>Теза Кодда</strong>: будь-яка мова запитів, що реалізує всі операції реляційної алгебри (вибірку, проекцію, з'єднання, об'єднання, різницю, декартів добуток), є реляційно повною.",
"<strong>SQL реляційно повний</strong>: SELECT покриває σ і π; JOIN — з'єднання; UNION — об'єднання; EXCEPT — різниця; WHERE + subquery — квантори ∃/∀.",
"QBE, QUEL — також реляційно повні. Реляційна повнота — мінімальна вимога до мови запитів СУБД."
]},
{t:"Мова SQL. Структура оператора SELECT.",b:[
"Загальна структура: <code>SELECT [DISTINCT] список / FROM таблиці / [JOIN ... ON ...] / [WHERE умова] / [GROUP BY атрибути] / [HAVING умова] / [ORDER BY атрибут [ASC|DESC]] / [LIMIT n OFFSET m]</code>",
"<strong>Логічний порядок виконання</strong>: FROM → (JOIN) → WHERE → GROUP BY → HAVING → SELECT → DISTINCT → ORDER BY → LIMIT/OFFSET.",
"<strong>Аліаси таблиць</strong>: <code>FROM employees e</code>. <strong>Аліаси стовпців</strong>: <code>SELECT name AS employee_name</code>.",
"<strong>DISTINCT</strong>: видаляє дублікати з результату. <strong>*</strong>: всі стовпці.",
"<strong>WHERE vs HAVING</strong>: WHERE фільтрує рядки <em>до</em> групування, HAVING — <em>після</em> (на групи, зазвичай з агрегатами)."
]},
{t:"Мова SQL. Запити з множинними порівняннями.",b:[
"<strong>Підзапити (subqueries)</strong>: у WHERE, FROM (inline view), SELECT (scalar subquery). Корельовані — виконуються для кожного рядка зовнішнього запиту.",
"<strong>IN / NOT IN</strong>: <code>WHERE dept_id IN (SELECT id FROM depts WHERE budget > 1000000)</code>.",
"<strong>EXISTS / NOT EXISTS</strong>: <code>WHERE EXISTS (SELECT 1 FROM orders o WHERE o.cust_id = c.id)</code>. Ефективніший за IN для великих підзапитів.",
"<strong>ANY / ALL</strong>: <code>WHERE salary > ALL (SELECT salary FROM managers)</code>.",
"<strong>JOIN-типи</strong>: INNER JOIN (лише збіги), LEFT OUTER JOIN (всі зліва + збіги справа), RIGHT OUTER JOIN, FULL OUTER JOIN, CROSS JOIN (декартів добуток), SELF JOIN.",
"<strong>UNION / INTERSECT / EXCEPT</strong>: об'єднання результатів SELECT. UNION ALL — без видалення дублікатів."
]},
{t:"Мова SQL. Вбудовані функції.",b:[
"<strong>Агрегатні</strong>: <code>COUNT(*)</code>, <code>SUM(col)</code>, <code>AVG(col)</code>, <code>MIN(col)</code>, <code>MAX(col)</code>. NULL ігноруються (крім COUNT(*)). Використовуються з GROUP BY.",
"<strong>Рядкові</strong>: LENGTH, UPPER/LOWER, SUBSTR(str,pos,len), TRIM, CONCAT, REPLACE, LIKE (% — будь-яка послідовність, _ — один символ).",
"<strong>Числові</strong>: ABS, ROUND(n,d), FLOOR, CEIL, MOD, POWER, SQRT.",
"<strong>Дата/час</strong>: NOW(), CURRENT_DATE, DATE_ADD(date, INTERVAL n type), DATEDIFF, EXTRACT(YEAR FROM date), TO_DATE.",
"<strong>Умовні</strong>: <code>CASE WHEN ... THEN ... ELSE ... END</code>; COALESCE(a,b,c) — перше ненульове; NULLIF(a,b) — NULL якщо a=b.",
"<strong>Window functions</strong>: <code>ROW_NUMBER() OVER(PARTITION BY dept ORDER BY salary DESC)</code>; RANK(), DENSE_RANK(), LAG(col, n), LEAD(col, n), SUM() OVER(...)."
]},
{t:"Особливості мови QBE.",b:[
"<strong>QBE (Query By Example)</strong> — Мошé Злуф, IBM, 1975. Графічна таблична мова запитів.",
"<strong>Принцип</strong>: користувач заповнює «приклади» значень у клітинки таблиць-шаблонів. Умови пишуться безпосередньо в клітинці атрибута.",
"<strong>P. (Print)</strong>: вивести значення атрибута. Змінні-приклади позначаються підкресленням (_x). Однакові змінні в різних таблицях — implicit join.",
"<strong>Умови</strong>: <code>&gt;1000</code>, <code>=_x</code>, <code>&lt;&gt;NULL</code> — пишуться прямо в клітинці.",
"<strong>Агрегати</strong>: P.CNT., P.SUM., P.AVG. у відповідному стовпці.",
"Реляційно повна. Вплинула на Microsoft Access QBE та інші WYSIWYG-інструменти запитів."
]},
{t:"Функціональна залежність. Квазіключ, первинний ключ та їх знаходження.",b:[
"<strong>Функціональна залежність (ФЗ)</strong>: X → Y — якщо будь-які два кортежі, що збігаються на X, збігаються і на Y. X <em>функціонально визначає</em> Y.",
"<strong>Тривіальна ФЗ</strong>: Y ⊆ X. <strong>Нетривіальна</strong>: Y ⊄ X.",
"<strong>Замикання X⁺</strong>: множина всіх атрибутів, що функціонально випливають з X відносно множини ФЗ F. Алгоритм: X⁺ := X; поки є ФЗ (A→B) з A⊆X⁺: X⁺ := X⁺ ∪ B.",
"<strong>Квазіключ (superkey)</strong>: X такий, що X⁺ = всі атрибути схеми R.",
"<strong>Мінімальний ключ (candidate key)</strong>: квазіключ без зайвих атрибутів. Знаходження: для кожного квазіключа перевіряти, чи можна прибрати атрибут і залишитись квазіключем.",
"<strong>Первинний ключ (PK)</strong>: один обраний candidate key. Обмеження: NOT NULL + UNIQUE. Решта — <em>alternate keys</em>."
]},
{t:"Функціонально повна залежність. 2НФ.",b:[
"<strong>Функціонально повна залежність</strong>: X → Y повна, якщо не існує X' ⊂ X такого, що X' → Y. Тобто прибрати будь-який атрибут з X — і залежність зникне.",
"<strong>Часткова залежність</strong>: X → Y часткова, якщо ∃ X' ⊂ X: X' → Y.",
"<strong>1НФ</strong>: всі атрибути атомарні (немає повторюваних груп).",
"<strong>Друга нормальна форма (2НФ)</strong>: відношення в 1НФ і кожен неключовий атрибут <em>повністю</em> функціонально залежить від кожного candidate key.",
"Актуально лише при складених ключах. Якщо ключ простий → автоматично 2НФ.",
"Приклад порушення: R(StudentID, CourseID, Grade, StudentName). Ключ: (StudentID, CourseID). StudentName → StudentID (часткова). Декомпозиція: R1(StudentID, StudentName), R2(StudentID, CourseID, Grade)."
]},
{t:"Теорема Хіта (Heath).",b:[
"<strong>Теорема Хіта (1971)</strong>: якщо R(A, B, C) і виконується ФЗ A → B (де A, B, C — множини атрибутів, A∩C=∅), то R можна без втрат (lossless) розкласти на R₁(A,B) та R₂(A,C).",
"<strong>Lossless decomposition</strong>: π_{AB}(R) ⋈ π_{AC}(R) = R. Тобто join повертає вихідне відношення без фантомних (spurious) кортежів.",
"<strong>Умова lossless</strong>: спільний атрибут A у проекціях є ключем хоча б для одного з відношень R₁ або R₂ (A → AB або A → AC).",
"Теорема — теоретична основа нормалізації: кожен крок нормалізації (усунення порушення нормальної форми) є lossless-декомпозицією за Хітом."
]},
{t:"Мінімальна структура функціональних залежностей.",b:[
"<strong>Мінімальне покриття F_min</strong>: множина ФЗ, еквівалентна F (однакові замикання), але без надлишковості.",
"<strong>Алгоритм побудови мінімального покриття:</strong>",
"  (1) <em>Розщеплення правих частин</em>: кожна ФЗ виду X → A (одноатрибутна права частина).",
"  (2) <em>Усунення зайвих атрибутів зліва</em>: для X → A, атрибут B ∈ X зайвий, якщо (X\\{B})⁺ ∋ A. Видалити B.",
"  (3) <em>Усунення надлишкових ФЗ</em>: ФЗ X → A надлишкова, якщо A ∈ X⁺ у F без цієї ФЗ. Видалити.",
"Мінімальне покриття не єдине, але будь-яке дозволяє синтезувати 3НФ без втрат і зі збереженням ФЗ."
]},
{t:"Аксіоми Армстронга.",b:[
"Система правил виведення нових ФЗ з відомих. <strong>Повна і несуперечлива</strong> для реляційних схем.",
"<strong>A1 (Рефлексивність)</strong>: якщо Y ⊆ X, то X → Y. (Тривіальні ФЗ.)",
"<strong>A2 (Доповнення / Augmentation)</strong>: якщо X → Y, то XZ → YZ. (Додавання атрибутів з обох боків.)",
"<strong>A3 (Транзитивність)</strong>: якщо X → Y і Y → Z, то X → Z.",
"<strong>Похідні правила</strong>: Union: X→Y ∧ X→Z ⟹ X→YZ. Decomposition: X→YZ ⟹ X→Y. Pseudotransitivity: X→Y ∧ WY→Z ⟹ WX→Z.",
"<strong>Повнота</strong>: за аксіомами виводяться всі і лише ФЗ, що логічно слідують з F. Алгоритм замикання X⁺ коректний саме завдяки повноті аксіом."
]},
{t:"Третя нормальна форма (3НФ) та БКНФ.",b:[
"<strong>Транзитивна залежність</strong>: X → Y → Z, де Y — не квазіключ, Z — неключовий атрибут. X транзитивно визначає Z.",
"<strong>3НФ</strong>: в 2НФ і немає транзитивних залежностей неключових атрибутів від ключа. Або (еквівалентне визначення): для кожної нетривіальної ФЗ X → A або X — суперключ, або A — <em>ключовий</em> атрибут (входить до якогось candidate key).",
"Алгоритм синтезу 3НФ: (1) побудувати F_min; (2) для кожної ФЗ X→Y з F_min — створити схему R(X∪Y); (3) додати схему з candidate key якщо жодна не містить.",
"<strong>БКНФ (Boyce-Codd Normal Form)</strong>: для кожної нетривіальної ФЗ X → Y: X — суперключ. Суворіша за 3НФ.",
"БКНФ усуває всі аномалії на основі ФЗ, але може не зберігати залежності при декомпозиції. Якщо є кілька пересічних candidate keys — досягти БКНФ зі збереженням ФЗ може бути неможливо."
]},
{t:"Стратегії розподілу даних в розподілених БД.",b:[
"<strong>Горизонтальна фрагментація (sharding)</strong>: рядки розподіляються між вузлами за ключем (hash, range). Кожен вузол — підмножина рядків повної таблиці.",
"<strong>Вертикальна фрагментація</strong>: стовпці розподіляються між вузлами. Часто використовується разом з PK для з'єднання.",
"<strong>Реплікація</strong>: повні або часткові копії. Master-slave: читання з будь-якого, запис лише через master. Multi-master: запис на кількох → конфлікти. Підвищує доступність і throughput читання.",
"<strong>CAP-теорема (Брюер, 2000)</strong>: у розподіленій системі при розділенні мережі (P) не можна одночасно гарантувати Consistency і Availability. Лише CP або AP.",
"<strong>Consistent hashing</strong>: рівномірний розподіл при додаванні/видаленні вузлів. Мінімальна кількість переміщень даних."
]},
{t:"Багатозначні залежності. 4НФ. Теорема Фейджіна.",b:[
"<strong>Багатозначна залежність (БЗ)</strong>: X ↠ Y в R(X,Y,Z) означає, що для кожного значення X множина значень Y не залежить від Z. Формально: якщо (x,y₁,z₁) і (x,y₂,z₂) у R, то і (x,y₁,z₂) і (x,y₂,z₁) теж у R.",
"<strong>Тривіальна БЗ</strong>: Y⊆X або X∪Y = всі атрибути R.",
"<strong>4НФ</strong>: в БКНФ і не має нетривіальних БЗ. Нетривіальна БЗ (при X не суперключі) → аномалія вставки/видалення незалежних фактів.",
"<strong>Теорема Фейджіна (1977)</strong>: R(A,B,C) можна без втрат розкласти на R₁(A,B) і R₂(A,C) <em>тоді й тільки тоді</em>, коли A↠B (або A↠C). Узагальнення теореми Хіта з ФЗ на БЗ."
]},
{t:"Об'єктно-орієнтовані бази даних.",b:[
"<strong>ООБД</strong>: зберігають об'єкти мови програмування (а не кортежі), підтримують класи, успадкування, поліморфізм, ідентичність об'єктів (OID — незмінний незалежно від значень атрибутів).",
"<strong>Переваги</strong>: природне відображення складних структур (CAD, GIS, мультимедіа), відсутність impedance mismatch, навігаційний доступ через посилання.",
"<strong>Недоліки</strong>: менш стандартизовані (немає єдиного SQL аналогу), складніші ad-hoc запити, менша поширеність.",
"<strong>Об'єктно-реляційні СУБД (ORSQL)</strong>: PostgreSQL, Oracle — розширення SQL: власні типи (CREATE TYPE), масиви, JSON/JSONB, XML, успадкування таблиць (INHERITS).",
"<strong>ORM</strong>: Hibernate (Java), SQLAlchemy (Python) — прошарок між об'єктами коду і реляційними таблицями. Lazy loading, N+1 problem, migration tools (Flyway, Alembic)."
]},
{t:"Бази даних та бази знань.",b:[
"<strong>База даних (БД)</strong>: зберігає <em>факти</em> (структуровані дані). Відповідає лише на запити про явно збережені факти.",
"<strong>База знань (БЗн)</strong>: зберігає факти + правила виводу + метазнання (знання про знання). Може виводити нові факти через логічний вивід (inference).",
"<strong>Система управління БЗн</strong>: inference engine + база правил + факти. Приклади: Prolog (SLD-resolution), CLIPS, DROOLS, OWL reasoners.",
"<strong>Відмінність</strong>: БД — пасивне сховище; БЗн — активна, відповідає на питання про факти, які не збережені явно, але виводяться із правил.",
"Приклад: правило «якщо X — батько Y, і Y — батько Z, то X — дід Z». При запиті «хто дід Петра?» БЗн виведе відповідь із збережених фактів про батьків."
]},
{t:"Моделі представлення знань в базах знань.",b:[
"<strong>Логічна модель (логіка предикатів / Horn clauses)</strong>: факти і правила — формули логіки. Прологівські програми. Точний, але не завжди ефективний вивід. Складне управління невизначеністю.",
"<strong>Продукційні правила (production rules)</strong>: ЯКЩО &lt;умова&gt; ТО &lt;дія&gt;. Зрозумілі для людини. Основа класичних експертних систем (MYCIN, XCON). Двонаправлений вивід: forward chaining (від фактів до висновку) і backward chaining (від цілі до фактів).",
"<strong>Семантичні мережі</strong>: граф — вузли (поняття/сутності) + дуги (відношення: is-a, part-of, has-attribute). Наочні, але складна формальна семантика.",
"<strong>Фрейми (Мінський, 1975)</strong>: структуровані описи об'єктів/ситуацій — слоти (атрибути) з типами, значеннями за замовчуванням і процедурами-даймонами. Близько до ООП.",
"<strong>Онтології</strong>: формальний явний опис предметної області — класи, властивості, обмеження, аксіоми. RDF (граф фактів), OWL (Web Ontology Language на базі description logics). Semantic Web, Knowledge Graphs (Google, Wikidata)."
]}
]
];

let activeTab=0, openIdx={};
function renderSection(sec,idx){
  const el=document.getElementById('sec'+idx);
  el.innerHTML='';
  sec.forEach((q,qi)=>{
    const key=idx+'_'+qi;
    const isOpen=!!openIdx[key];
    const block=document.createElement('div');
    block.className='q-block';
    block.innerHTML=`<div class="q-head" onclick="toggle(${idx},${qi})">
      <span class="q-num">${qi+1}.</span>
      <span class="q-title">${q.t}</span>
      <span class="arrow ${isOpen?'open':''}">▶</span>
    </div>
    <div class="q-body ${isOpen?'open':''}">
      ${q.b.map(p=>`<p>${p}</p>`).join('')}
    </div>`;
    el.appendChild(block);
  });
}
function toggle(si,qi){
  const key=si+'_'+qi;
  openIdx[key]=!openIdx[key];
  renderSection(data[si],si);
}
function switchTab(idx){
  activeTab=idx;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.section').forEach((s,i)=>s.classList.toggle('active',i===idx));
  document.getElementById('search').value='';
  document.querySelector('.expand-all').textContent='Розгорнути всі ▾';
}
let allExpanded=false;
function expandAll(){
  allExpanded=!allExpanded;
  document.querySelector('.expand-all').textContent=allExpanded?'Згорнути всі ▴':'Розгорнути всі ▾';
  data[activeTab].forEach((_,qi)=>{openIdx[activeTab+'_'+qi]=allExpanded;});
  renderSection(data[activeTab],activeTab);
}
function doSearch(v){
  v=v.trim().toLowerCase();
  document.querySelectorAll('.section').forEach((s,si)=>{
    if(!v){s.classList.toggle('active',si===activeTab);renderSection(data[si],si);return;}
    s.classList.add('active');
    s.innerHTML='';
    let found=0;
    data[si].forEach((item,qi)=>{
      if((item.t+' '+item.b.join(' ')).toLowerCase().includes(v)){
        found++;
        const key=si+'_'+qi,isOpen=!!openIdx[key];
        const block=document.createElement('div');
        block.className='q-block';
        block.innerHTML=`<div class="q-head" onclick="toggle(${si},${qi})">
          <span class="q-num">${qi+1}.</span>
          <span class="q-title">${item.t}</span>
          <span class="arrow ${isOpen?'open':''}">▶</span>
        </div>
        <div class="q-body ${isOpen?'open':''}">
          ${item.b.map(p=>`<p>${p}</p>`).join('')}
        </div>`;
        s.appendChild(block);
      }
    });
    if(!found)s.innerHTML='<p class="no-results">Нічого не знайдено в цьому розділі.</p>';
  });
  if(!v)document.querySelectorAll('.section').forEach((s,i)=>s.classList.toggle('active',i===activeTab));
}
data.forEach((sec,idx)=>renderSection(sec,idx));
</script>
</body>
</html>
