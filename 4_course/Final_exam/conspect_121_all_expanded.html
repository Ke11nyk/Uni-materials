{
t:"Поняття алгоритму. Формальні моделі (МТ, регістрові машини). Частково рекурсивні, рекурсивні, примітивно рекурсивні функції. Теза Чорча.",
b:`
<h3>Поняття алгоритму</h3>
<p>Алгоритм — скінченна детермінована послідовність інструкцій, яка для кожного допустимого входу за скінченну кількість кроків продукує результат. Класичні властивості: <strong>дискретність</strong> (кроки чітко розмежовані), <strong>детермінованість</strong> (кожен стан однозначно визначає наступний), <strong>результативність</strong> (зупинка з відповіддю), <strong>масовість</strong> (працює для цілого класу задач), <strong>скінченність</strong> опису.</p>
<div class="note">Проблема: «алгоритм» — інтуїтивне поняття. Для строгих доведень потрібна <em>формальна модель</em>.</div>

<h3>Машина Тьюрінга (МТ)</h3>
<p>МТ = (Q, Σ, Γ, δ, q₀, q_accept, q_reject), де Q — скінченна множина станів, Σ — вхідний алфавіт, Γ ⊇ Σ — стрічковий алфавіт (містить символ «пробілу» ␣), δ: Q×Γ → Q×Γ×{L,R} — функція переходів, q₀ — початковий стан.</p>
<p>На кожному кроці голівка читає символ, змінює стан, записує новий символ і рухається ліворуч або праворуч. МТ зупиняється в q_accept (прийнято) або q_reject (відхилено). Якщо МТ ніколи не потрапляє в ці стани — вона <em>зациклюється</em>.</p>
<p>МТ обчислює <em>часткову функцію</em> f: Σ* → Σ* — результат записаний на стрічці після зупинки. Мова, прийнята МТ — <em>рекурсивно перелічна (р.п.)</em>. Якщо МТ завжди зупиняється — мова <em>рекурсивна (розв'язна)</em>.</p>

<h3>Регістрова машина (УМ / RAM)</h3>
<p>Альтернативна формальна модель, ближча до реального процесора. Скінченна кількість регістрів R₀, R₁, … — кожен зберігає натуральне число. Команди: ZERO(i) — R_i := 0; SUCC(i) — R_i := R_i+1; COPY(i,j) — R_j := R_i; JUMP(i,j,k) — якщо R_i = R_j, перейти до команди k.</p>
<p>Попри зовнішню несхожість, регістрова машина <strong>еквівалентна МТ</strong> за обчислювальною потужністю: будь-яка функція, обчислювана МТ, обчислюється і регістровою машиною, і навпаки.</p>

<h3>Примітивно рекурсивні (ПР) функції</h3>
<p>Найменший клас функцій ℕᵏ → ℕ, що містить базові функції та замкнений відносно двох операцій:</p>
<ul>
  <li><strong>Базові:</strong> нульова O(x)=0; слідування S(x)=x+1; проекції Iₙᵢ(x₁,…,xₙ)=xᵢ.</li>
  <li><strong>Суперпозиція (Cn):</strong> h(x̄) = f(g₁(x̄),…,gₘ(x̄)).</li>
  <li><strong>Примітивна рекурсія (Pr):</strong> f(x̄,0)=g(x̄); f(x̄,n+1)=h(x̄,n,f(x̄,n)).</li>
</ul>
<p>ПР-функції завжди <strong>тотальні</strong>. Вони охоплюють усі звичайні арифметичні операції (+, ×, !, exp), предикати (рівність, ділення). Але ПР ≠ всі обчислювані функції: <strong>функція Акермана</strong> A(m,n) тотальна й обчислювана, але не є ПР (зростає швидше за будь-яку ПР-функцію).</p>

<h3>Частково рекурсивні (ЧР) функції</h3>
<p>ПР-клас + оператор мінімізації: μy[f(x̄,y)=0] — знайти найменше y, при якому f=0. Якщо такого y немає — функція <em>не визначена</em> (часткова). Саме цей клас збігається з класом МТ-обчислюваних функцій.</p>

<h3>Рекурсивні функції</h3>
<p>ЧР-функції, визначені скрізь (тотальні). Відповідають розв'язним проблемам.</p>

<h3>Теза Чорча–Тьюрінга</h3>
<p>«Кожна інтуїтивно обчислювана функція є частково рекурсивною» — і рівносильно — «обчислюваною МТ». Це <em>не математична теорема</em>, а методологічне твердження: всі відомі формалізації обчислень (МТ, λ-числення Чорча, регістрові машини, машини Поста, необмежені нормальні алгоритми Маркова) виявились еквівалентними. Практично: якщо доводимо нерозв'язність в одній моделі — вона нерозв'язна й у всіх інших.</p>
`
},
{
t:"Нумерації. Універсальні функції. Універсальна ЧР-функція. Універсальна МТ.",
b:`
<h3>Нумерації</h3>
<p>Нумерація — сюр'єктивне відображення ν: ℕ → A, що ставить кожному натуральному числу у відповідність об'єкт із класу A. Нумерація МТ (гьоделізація): кожній МТ M ставимо у відповідність натуральне число e (її <em>гьоделів номер</em>, або <em>код</em>). Зручне кодування: MТ кодується через опис алфавіту, станів і таблиці переходів у двійковому записі із розділювачами. Позначення: φ_e — частково рекурсивна функція, обчислювана МТ з номером e; W_e = dom(φ_e) — область визначення.</p>
<div class="note">Нумерація дозволяє трактувати «програму» як «дані» — принцип, на якому базується вся сучасна комп'ютерна архітектура.</div>

<h3>Універсальна функція</h3>
<p>Функція U(e, x) = φ_e(x) — отримує номер e програми та вхід x, симулює виконання e-ї МТ на x. <strong>Теорема:</strong> існує ЧР-функція U, що є універсальною для всього класу ЧР-функцій, тобто U сама належить класу ЧР.</p>
<p>Звідси важливий наслідок: клас ЧР-функцій є <em>ефективно перерахованим</em> — всі ЧР-функції впорядковані в послідовність φ₀, φ₁, φ₂, … і для будь-якого e і x можна обчислити φ_e(x).</p>

<h3>Теорема s-m-n (Клін)</h3>
<p>Для будь-яких m,n ≥ 1 існує тотальна рекурсивна функція s: ℕᵐ⁺¹ → ℕ така, що φ_{s(e,y₁,…,yₘ)}(x₁,…,xₙ) = φ_e(y₁,…,yₘ,x₁,…,xₙ). Тобто можна «запекти» аргументи в код програми — основа каррінгу і часткового застосування.</p>

<h3>Універсальна МТ (УМТ)</h3>
<p>Конкретна МТ U, що на вході ⟨e, w⟩ (пара: код МТ і вхід) симулює роботу МТ з номером e на рядку w. Кроки симуляції: читати стан і символ симульованої МТ зі спеціальної зони стрічки, знайти відповідний перехід у «таблиці» (теж на стрічці), оновити конфігурацію. УМТ існує і є скінченним об'єктом — це перший «комп'ютер із програмою в пам'яті» в математичному сенсі.</p>
<div class="warn">Саме існування УМТ доводить нерозв'язність проблеми зупинки: якби HP була розв'язна, ми могли б «зупинити» УМТ на будь-якому вході — суперечність діагоналізацією.</div>
`
},
{
t:"Примітивно рекурсивні, рекурсивні та рекурсивно перелічні множини. Теорема Поста.",
b:`
<h3>Визначення класів множин</h3>
<p><strong>Примітивно рекурсивна (ПР) множина:</strong> характеристична функція χ_A (χ_A(x)=1 якщо x∈A, 0 інакше) є примітивно рекурсивною. Всі скінченні множини ПР; множина простих чисел ПР; множина рядків певної регулярної граматики ПР.</p>
<p><strong>Рекурсивна (розв'язна) множина:</strong> χ_A — тотальна рекурсивна функція. Існує МТ, що <em>завжди зупиняється</em> і правильно відповідає «так/ні» для будь-якого входу. Клас рекурсивних множин замкнений відносно ∪, ∩, доповнення, різниці.</p>
<p><strong>Рекурсивно перелічна (р.п.) множина:</strong> A = dom(φ_e) для деякого e. Еквівалентні визначення: A — порожня, або A — область значень деякої тотальної рекурсивної функції (можна «перерахувати» всі елементи). МТ для р.п. множини: зупиняється і приймає, якщо x∈A, але <em>може зациклитись</em>, якщо x∉A.</p>
<p>Ієрархія: ПР ⊂ Рекурсивні ⊂ Р.П. Всі включення строгі.</p>

<h3>Приклад нерекурсивної р.п. множини</h3>
<p>K = {e : φ_e(e)↓} (проблема самозастосовності). K є р.п. (МТ для K: запустити φ_e на e; якщо зупиниться — прийняти). Але K <em>не рекурсивна</em>: якби існувала МТ D для K, можна побудувати суперечну МТ (діагоналізація Кантора). K̄ (доповнення K) — не р.п.</p>

<h3>Теорема Поста</h3>
<p><strong>Теорема:</strong> Множина A рекурсивна тоді й тільки тоді, коли <em>і A, і Ā є рекурсивно перелічними</em>.</p>
<p><strong>Доведення (⇒):</strong> Якщо A рекурсивна, то і A, і Ā рекурсивні, а значить — р.п.</p>
<p><strong>Доведення (⇐):</strong> Маємо МТ M₁ для A і МТ M₂ для Ā. Для вхідного x запускаємо M₁ і M₂ паралельно (покрокова симуляція обох). Одна з них обов'язково зупиниться: якщо M₁ — то x∈A; якщо M₂ — то x∉A. Отже, є алгоритм, що завжди дає відповідь → A рекурсивна.</p>
<div class="note">Практичний наслідок: щоб довести, що K нерекурсивна, досить показати, що K̄ не є р.п. (а це доводиться через продуктивність доповнення K).</div>
`
},
{
t:"Алгоритмічна розв'язність, часткова розв'язність та нерозв'язність масових проблем.",
b:`
<h3>Масова проблема</h3>
<p>Масова проблема — задача вигляду «для <em>довільного</em> x із нескінченної множини входів визначити, чи виконується властивість P(x)». Приклади: «чи є дане число простим?»; «чи зупиниться програма P на вході w?»; «чи є дане рівняння розв'язним у цілих числах?».</p>

<h3>Розв'язність</h3>
<p><strong>Алгоритмічно розв'язна:</strong> існує МТ (алгоритм), що для <em>будь-якого</em> x зупиняється і дає правильну відповідь так/ні. Відповідна множина {x : P(x)} — рекурсивна.</p>
<p>Приклади розв'язних: первинність (тест Міллера-Рабіна або AKS), сортування, пошук у графі, виконуваність булевих формул у КНФ (SAT — розв'язна, хоча й NP-повна).</p>

<h3>Часткова розв'язність</h3>
<p><strong>Частково розв'язна (напіврозв'язна):</strong> існує МТ, що зупиняється і відповідає «так» для всіх x∈A, але <em>може зациклюватись</em> для x∉A. Відповідна множина — р.п.</p>
<p>Приклад: «чи зупиниться МТ M на вході w?» — частково розв'язна (просто симулюємо M на w; якщо зупиниться — відповідь «так»; якщо ні — чекаємо вічно).</p>

<h3>Нерозв'язність</h3>
<p><strong>Нерозв'язна:</strong> не існує <em>жодного</em> алгоритму, що правильно відповідає для всіх входів. Приклади:</p>
<ul>
  <li>Проблема зупинки HP (Тьюрінг, 1936).</li>
  <li>10-та проблема Гільберта: «чи має діофантове рівняння цілочисельний розв'язок?» (нерозв'язність — Матіясевич, 1970).</li>
  <li>Проблема відповідності Поста (PCP).</li>
  <li>Еквівалентність програм, тотальність програми (з теореми Райса).</li>
</ul>
<div class="warn">Нерозв'язність ≠ «дуже складна задача». Нерозв'язна задача — це задача, для якої <em>принципово не існує</em> алгоритму, незалежно від обчислювальних ресурсів.</div>
`
},
{
t:"Нерозв'язність проблем зупинки та самозастосовності. Наслідки. Теорема Райса.",
b:`
<h3>Проблема зупинки (Halting Problem, HP)</h3>
<p>HP: «Для довільної МТ M і входу w — чи зупиниться M на w?»</p>
<p><strong>Теорема Тьюрінга (1936):</strong> HP нерозв'язна.</p>
<p><strong>Доведення (діагоналізація):</strong> Припустимо, існує тотальна МТ H(e,w) = 1 якщо φ_e(w)↓, 0 інакше. Побудуємо МТ D(e): якщо H(e,e)=1 — зациклюватись; якщо H(e,e)=0 — зупинитись. Нехай d — гьоделів номер D. Тоді D(d): якщо H(d,d)=1 (D зупиниться на d) → D зациклюється — суперечність; якщо H(d,d)=0 (D зациклюється) → D зупиняється — суперечність. Отже, H не існує. ∎</p>

<h3>Проблема самозастосовності</h3>
<p>K = {e : φ_e(e)↓} — «чи зупиниться МТ M на своєму власному коді?» Частковий випадок HP (w=e). K є р.п. (запустити φ_e(e)), але нерекурсивна. Доводиться тими самими ж діагональним аргументом.</p>

<h3>Наслідки нерозв'язності HP</h3>
<ul>

  <li>{e : W_e = ℕ} — нерозв'язна (тотальність програми).</li>
  <li>{(e,i) : W_e = W_i} — нерозв'язна (еквівалентність програм).</li>
  <li>{e : φ_e є тотальною} — нерозв'язна.</li>
</ul>

<h3>Теорема Райса (1953)</h3>
<p><strong>Теорема:</strong> Нехай C — клас ЧР-функцій, ∅ ≠ C ≠ (всі ЧР-функції). Тоді множина {e : φ_e ∈ C} нерозв'язна.</p>
<p>Іншими словами: будь-яка нетривіальна <em>семантична</em> властивість програм нерозв'язна. (Семантична = залежить від обчислюваної функції, а не від синтаксису програми.)</p>

<div class="note">Практичний смисл: жоден статичний аналізатор не може <em>точно</em> визначити для всіх програм, чи обчислює вона конкретну функцію. Всі реальні аналізатори або дають хибнопозитивні, або хибнонегативні результати.</div>

<h3>Звідність</h3>
<p>Звідність — відношення між задачами, що формалізує «не складніша за». A ≤ B означає: маючи розв'язувач B, можна побудувати розв'язувач A. Якщо B розв'язна і A≤B, то A розв'язна. Контрапозитив: якщо A нерозв'язна і A≤B, то B нерозв'язна (метод доведення нерозв'язності!).</p>

<h3>m-звідність (many-one reduction)</h3>
<p>A ≤_m B: існує тотальна рекурсивна функція f: ℕ→ℕ така, що ∀x: x∈A ⟺ f(x)∈B. Функція f «перекладає» входи A на входи B. «Many-one» — бо кілька елементів A можуть відображатись в один елемент B.</p>
<p><strong>Властивості:</strong> ≤_m рефлексивне та транзитивне. Якщо A ≤_m B і B рекурсивна → A рекурсивна. Якщо A ≤_m B і B р.п. → A р.п.</p>
<p><strong>m-повна р.п. множина:</strong> B р.п. і A ≤_m B для всіх р.п. A. Канонічний приклад: K = {e : φ_e(e)↓} — m-повна р.п. множина. Будь-яку р.п. множину можна звести до K.</p>

<h3>Продуктивні множини</h3>

<p>Приклад: K̄ (доповнення K) — продуктивна, f(e) = e.</p>

<p>Три кроки: (1) <strong>Divide</strong> — розбити задачу розміру n на a підзадач розміру n/b; (2) <strong>Conquer</strong> — вирішити рекурсивно; (3) <strong>Combine</strong> — об'єднати за D(n) операцій. Рекурентне співвідношення: T(n) = aT(n/b) + D(n).</p>

<p><strong>2. Дерево рекурсії:</strong> намалювати рівні: рівень 0 — n, рівень 1 — a вузлів по n/b, …, лист — розмір 1. Підрахувати роботу на кожному рівні та просумувати.</p>

<h3>Ідея амортизаційного аналізу</h3>
<p>Звичайний аналіз worst case може бути надто песимістичним для послідовності операцій: хоча одна окрема операція може бути дорогою, вона трапляється рідко. Амортизаційний аналіз дає точнішу оцінку <em>середньої вартості на операцію</em> по послідовності, <strong>без ймовірнісних припущень</strong> (на відміну від average-case аналізу).</p>

<h3>Метод агрегату</h3>
<p>Порахувати загальну вартість T(n) найгіршої послідовності n операцій. Амортизована вартість = T(n)/n.</p>
<p><strong>Приклад — стек з операцією MULTIPOP(S,k):</strong> витягує min(k,|S|) елементів. Кожен pop — O(1), MULTIPOP — O(k). Але: кожен елемент push рівно один раз → загальна кількість pop не перевищує загальної кількості push = n. Отже T(n) = O(n), амортизована = O(1) на операцію.</p>

<h3>Метод обліку (бухгалтерський)</h3>
<p>Кожній операції призначаємо <em>амортизовану вартість</em> ĉᵢ (може бути більше або менше реальної cᵢ). Різниця ĉᵢ−cᵢ = «кредит», що зберігається в банку. Умова коректності: сума кредитів завжди ≥ 0.</p>
<p><strong>Динамічний масив:</strong> push_back: якщо є місце — O(1); при заповненні — O(n) (копіювання). Призначимо ĉ(push)=3: 1 за себе + 2 кредити (один для майбутнього переміщення себе, один для «старого» елемента). При розширенні — ≤ n/2 нових елементів покривають переміщення n елементів. Загалом O(1) amortized.</p>

<h3>Потенціальний метод</h3>
<p>Визначаємо потенціал Φ(D) стану структури D. Амортизована вартість: ĉᵢ = cᵢ + Φ(Dᵢ) − Φ(Dᵢ₋₁). Тоді Σcᵢ = Σĉᵢ − (Φ(Dₙ)−Φ(D₀)). Якщо Φ(Dₙ)≥Φ(D₀): Σcᵢ ≤ Σĉᵢ.</p>
<p><strong>Динамічний масив:</strong> Φ(D) = 2·size − capacity (кількість елементів × 2 − розмір масиву). При звичайному push: Φ зростає на 2 → ĉ=1+2=3. При розширенні (size=capacity=n): cᵢ=n+1, Φ падає з n до 2 → ĉ=n+1+2−n=3. Отже ĉ=3 завжди → O(1) amortized. ∎</p>

<h3>Порівняльне сортування — нижня межа Ω(n log n)</h3>
<p>Будь-який алгоритм, що сортує лише порівняннями, виконує Ω(n log n) порівнянь у гіршому випадку. Доведення: дерево рішень має ≥ n! листків; висота ≥ log₂(n!) = Ω(n log n) за формулою Стірлінга.</p>

<h3>Прості алгоритми O(n²)</h3>
<p><strong>Insertion sort:</strong> вставляємо i-й елемент на правильне місце серед перших i−1 відсортованих. Стабільне, in-place. Θ(n²) гірший, Θ(n) кращий (майже відсортований). Ефективне для n&lt;~50 через малі константи.</p>
<p><strong>Selection sort:</strong> знаходимо мінімум серед i..n і міняємо місцями з i-м. Θ(n²) завжди. Мінімум n−1 обмінів (зручно, якщо обміни дорогі). Нестабільне.</p>
<p><strong>Bubble sort:</strong> прохід по масиву, обмін сусідів, що стоять неправильно. Стабільне, O(n²). Практично не використовується — гірший навіть за insertion sort за константами.</p>

<h3>Ефективні алгоритми O(n log n)</h3>
<p><strong>Merge sort:</strong> розбити на дві половини, рекурсивно відсортувати, злити. Злиття O(n). T=2T(n/2)+n → Θ(n log n) гарантовано. Стабільне. Потребує O(n) додаткової пам'яті. Ідеальне для зв'язних списків і зовнішнього сортування.</p>
<p><strong>Heap sort:</strong> побудувати max-heap (O(n)), n разів витягувати максимум і класти в кінець (O(log n) кожен). Θ(n log n) завжди. In-place, нестабільне. Менш кеш-сприятливе, ніж quicksort.</p>
<p><strong>Quick sort:</strong> обрати pivot, partition (всі &lt;pivot ліворуч, всі >pivot праворуч), рекурсивно. Середній O(n log n), гірший O(n²) (коли pivot завжди крайній на відсортованому масиві). Randomized quicksort — вибір випадкового pivot → O(n log n) expected. In-place, нестабільне. На практиці найшвидше через кеш-ефективність.</p>

<h3>Лінійне сортування (нижня межа не застосовна — не порівняльне)</h3>
<p><strong>Counting sort:</strong> масив лічильників частот, потім кумулятивні суми. O(n+k), k — діапазон значень. Стабільне. Практично при k=O(n).</p>
<p><strong>Radix sort:</strong> сортуємо по цифрах (від молодшої до старшої) стабільним сортуванням. O(d(n+k)), d — кількість цифр. Для 32-бітних int: d=8, k=256 → ефективно.</p>
<p><strong>Bucket sort:</strong> розподілити по кошикам, відсортувати кожний (insertion sort), конкатенувати. O(n) expected для рівномірного розподілу на [0,1).</p>

<h3>Списки</h3>
<p><strong>Однозв'язний список:</strong> node = {data, *next}. Вставка/видалення на початок — O(1); пошук — O(n); вставка в середину (з вказівником) — O(1); без вказівника — O(n).</p>
<p><strong>Двозв'язний список:</strong> node = {*prev, data, *next}. Видалення відомого вузла — O(1) (є prev). Вдвічі більше пам'яті на зв'язки. Стандарт у std::list (C++).</p>
<p><strong>Масив vs список:</strong> масив — O(1) доступ по індексу, O(n) вставка в середину; список — O(n) доступ, O(1) вставка при відомому місці. Вибір залежить від операцій.</p>

<h3>Стек (LIFO)</h3>
<p>Операції: push(x) — O(1), pop() — O(1), peek() — O(1). Реалізація: масив з індексом верхівки або однозв'язний список (push/pop на початок). Застосування: виконання рекурсивних викликів, ітеративний DFS, перевірка дужок, обчислення виразів у постфіксному записі.</p>

<h3>Черга (FIFO)</h3>
<p>enqueue(x), dequeue() — O(1). Реалізація: кільцевий масив (два індекси front, back) або двозв'язний список. Deque (двостороння черга): push/pop з обох кінців — O(1).</p>

<h3>Черга з пріоритетом</h3>
<p>insert(x, p), extract_min() / extract_max(). Наївно (масив): O(1) insert, O(n) extract. Треба ефективніше.</p>
<p><strong>Бінарна купа (heap):</strong> повне бінарне дерево у масиві. Індексація: ліво=2i, право=2i+1, батько=⌊i/2⌋. <em>Heap property</em>: A[parent] ≤ A[i] (min-heap). insert: додати в кінець, sift-up — O(log n). extract-min: замінити корінь на останній, sift-down — O(log n). build-heap: O(n) (не O(n log n)!) — будуємо знизу вгору.</p>
<p><strong>Біноміальна купа:</strong> колекція біноміальних дерев B₀, B₁, … де Bₖ має 2ᵏ вузлів. Union двох купа — O(log n) (аналогічно двійковому додаванню). insert — O(1) amortized. extract-min — O(log n).</p>
<p><strong>Піраміда Фібоначчі (Fibonacci heap):</strong> ліниві об'єднання, decrease-key — O(1) amortized (лише відрізаємо піддерево), extract-min — O(log n) amortized. Теоретично оптимальна для алгоритму Дейкстри → O(E+V log V).</p>

<h3>Визначення та термінологія</h3>
<p>Дерево = зв'язний ациклічний граф. Кореневе дерево: один виділений вузол — корінь. <em>Глибина вузла v</em> = довжина шляху від кореня до v. <em>Висота дерева</em> = максимальна глибина листка. Вузол без дітей — листок.</p>

<h3>Представлення</h3>
<ul>
  <li><strong>Масив вказівників:</strong> node = {data, vector&lt;Node*&gt; children}. Універсально, але пам'ять-витратне.</li>
  <li><strong>Перша дитина — наступний сиблінг (left-child right-sibling):</strong> node = {data, *firstChild, *nextSibling}. Ощадливо по пам'яті для дерев довільного ступеня.</li>
  <li><strong>Масив для повного бінарного дерева:</strong> вузол i → ліво=2i, право=2i+1, батько=⌊i/2⌋. Без вказівників. Використовується у heap.</li>
</ul>

<h3>Обходи бінарного дерева</h3>
<p><strong>Inorder (LNR):</strong> ліве — корінь — праве. Для BST → відсортований порядок.</p>
<p><strong>Preorder (NLR):</strong> корінь — ліве — праве. Серіалізація, копіювання структури.</p>
<p><strong>Postorder (LRN):</strong> ліве — праве — корінь. Обчислення виразів, видалення дерева.</p>
<p><strong>Рівневий (BFS):</strong> черга. Рівень за рівнем, зліва направо.</p>
<pre>// Ітеративний inorder (без рекурсії)
stack&lt;Node*&gt; s; Node* cur = root;
while (cur || !s.empty()) {
  while (cur) { s.push(cur); cur = cur->left; }
  cur = s.top(); s.pop();
  visit(cur);
  cur = cur->right;
}</pre>
<p>Ітеративний обхід уникає stack overflow для глибоких дерев (h=n у виродженому випадку). Але рекурсивний код значно простіший — для збалансованих дерев h=O(log n) і рекурсія безпечна.</p>
`
},
{
t:"Дерева бінарного пошуку (BST). Збалансовані дерева. Червоно-чорні дерева. B-дерева.",
b:`
<h3>BST</h3>
<p>Інваріант: для кожного вузла v: всі ключі в лівому піддереві < key(v) < всі ключі у правому. Search, insert, delete — O(h), де h — висота. Якщо вставляти в випадковому порядку — h=Θ(log n) очікувано. Але відсортований вхід → h=n → О(n).</p>

<h3>Червоно-чорне дерево (Red-Black Tree)</h3>
<p>BST + властивості забарвлення для підтримки h=O(log n):</p>
<ol>
  <li>Кожен вузол — червоний або чорний.</li>
  <li>Корінь — чорний.</li>
  <li>Листки (NIL-вузли) — чорні.</li>
  <li>Якщо вузол червоний — обидва сини чорні (немає двох червоних поспіль).</li>
  <li>Для кожного вузла всі прості шляхи до NIL-нащадків містять однакову кількість чорних вузлів (black-height, bh).</li>
</ol>
<p><strong>Теорема:</strong> h ≤ 2·log₂(n+1). Доведення: будь-який шлях ≤ 2·bh·log₂(n+1).</p>
<p>Insert: звичайна BST-вставка (новий вузол — червоний) + <em>fixup</em>: якщо батько теж червоний — ротація та/або перефарбування. Щонайбільше 2 ротації. Delete: складніший fixup, щонайбільше 3 ротації. Обидва — O(log n).</p>
<p>Використовується: std::map і std::set у C++ STL, TreeMap у Java, ядро Linux (CFS scheduler).</p>

<h3>B-дерево (Bayer & McCreight, 1972)</h3>
<p>Призначене для дискових систем де вартість доступу пропорційна кількості блоків, а не порівнянь. Параметр t (мінімальний ступінь) ≥ 2.</p>
<ul>
  <li>Кожен нелистковий вузол (крім кореня) має від t до 2t дітей; корінь — від 2 до 2t.</li>
  <li>Кожен вузол зберігає від t−1 до 2t−1 ключів (впорядкованих).</li>
  <li>Всі листки на одній глибині h = Θ(log_t n).</li>
</ul>
<p>При t=1000 і n=10⁹: h ≤ log₁₀₀₀(10⁹) = 3. Тобто 3 звернення до диска для будь-якого пошуку!</p>
<p><strong>B⁺-дерево:</strong> дані зберігаються лише у листках; листки пов'язані в двозв'язний список → ефективний range scan. Стандарт у СУБД (InnoDB, PostgreSQL).</p>
`
},
{
t:"Хешування і хеш-таблиці. Методи розв'язання колізій.",
b:`
<h3>Ідея хешування</h3>
<p>Хеш-таблиця T[0..m−1]: ключ k → h(k) ∈ {0,…,m−1}. В ідеалі — O(1) для insert, search, delete. Реально — залежить від якості h і вирішення <em>колізій</em> (коли h(k₁)=h(k₂) при k₁≠k₂).</p>

<h3>Хеш-функції</h3>
<p><strong>Метод ділення:</strong> h(k) = k mod m. m — просте, не близьке до степені 2 або 10.</p>
<p><strong>Метод множення:</strong> h(k) = ⌊m·{k·A}⌋, де {·} — дробова частина, A∈(0,1). Кнут рекомендує A=(√5−1)/2 ≈ 0.618.</p>
<p><strong>Universal hashing:</strong> випадково обрати функцію з сімейства H = {h_{a,b}(k) = ((ak+b) mod p) mod m} при фіксованих випадкових a,b (p — просте, p>u де u — розмір всесвіту ключів). Гарантує: для будь-яких двох ключів Pr[h(k₁)=h(k₂)] = 1/m. Захист від adversarial input.</p>

<h3>Ланцюжкове хешування (Chaining)</h3>
<p>Кожен слот T[j] — заголовок зв'язного списку всіх ключів зі значенням хешу j. При рівномірному хешуванні та коефіцієнті завантаження α=n/m: search — Θ(1+α). Допустимий α>1. Простота реалізації.</p>

<h3>Відкрита адресація (Open Addressing)</h3>
<p>Всі ключі зберігаються прямо в таблиці. При колізії — <em>зондування</em> (probe sequence). α&lt;1 обов'язково.</p>
<p><strong>Лінійне зондування:</strong> h(k,i) = (h(k)+i) mod m. Страждає від <em>первинної кластеризації</em> — довгі серії заповнених клітинок.</p>
<p><strong>Квадратичне зондування:</strong> h(k,i) = (h(k)+c₁i+c₂i²) mod m. Менша кластеризація, але треба підбирати c₁,c₂ щоб охопити всю таблицю.</p>
<p><strong>Подвійне хешування:</strong> h(k,i) = (h₁(k)+i·h₂(k)) mod m. Найкраще розсіювання. h₂(k) ≠ 0 завжди; зручно: h₂(k) = 1+(k mod (m−1)).</p>
<p><strong>Rehashing:</strong> при α > threshold (0.5..0.75) — виділити нову таблицю вдвічі більшого розміру, перехешувати всі елементи. Загальна вартість вставок n елементів — O(n) amortized (геометрична серія подвоєнь).</p>
`
},

t:"Алгоритми пошуку рядка: Боєр-Мур (Хорспул), КМП, Ахо-Корасік, Рабін-Карп.",
b:`
<h3>Постановка задачі</h3>
<p>Знайти всі входження патерну P[1..m] у текст T[1..n]. Наївний алгоритм: O(nm).</p>

<h3>КМП (Кнут-Морріс-Пратт, 1977)</h3>
<p><strong>Prefix-function π[i]</strong> = довжина найдовшого власного суфіксу P[1..i], що є також і префіксом P. Обчислюється за O(m).</p>
<pre>Для P = "ababaca":
π = [0, 0, 1, 2, 3, 0, 1]</pre>
<p>Пошук: рухаємось по T зліва направо, ніколи не відкочуємо індекс тексту назад. При неспівпаданні — використовуємо π для пропуску. O(n) порівнянь тексту. Разом: O(n+m).</p>
<p>КМП — оптимальний для одного патерну в найгіршому випадку.</p>

<h3>Алгоритм Боєра-Мура (1977)</h3>
<p>Два евристики, які дозволяють <em>пропускати</em> позиції (рухатись по тексту вправо стрибками):</p>
<p><strong>Bad character rule:</strong> при неспівпаданні T[i+j] ≠ P[j]: знайти останнє входження T[i+j] у P[0..j−1]; зсунути P праворуч щоб вирівняти. Зсув ≥ 1.</p>
<p><strong>Good suffix rule:</strong> якщо P[j+1..m] співпало, а P[j] ≠ T[i+j]: знайти наступне входження суфіксу P[j+1..m] в P. Більш складна в реалізації, але дає кращі зсуви.</p>
<p>Беремо максимум обох зсувів. <em>Kращий випадок:</em> O(n/m). <em>Найгірший:</em> O(nm) без good suffix (чи O(n) з обома правилами). Варіант Horspool — лише bad character з правого символу вікна — простіший і достатній на практиці.</p>

<h3>Ахо-Корасік (1975)</h3>
<p>Пошук множини k патернів P₁,…,Pₖ одночасно. Побудова: (1) Trie з усіх патернів — O(Σmᵢ). (2) Failure links (суфіксні зв'язки) аналогічно КМП — O(Σmᵢ). (3) Output links — ярлики входжень у внутрішніх вузлах. Пошук: O(n + кількість входжень). Незамінний у антивірусах, grep -F, мережевих IDS.</p>

<h3>Рабін-Карп (1987)</h3>
<p>Поліноміальний хеш: hash(P) = (P[1]·bᵐ⁻¹+…+P[m]) mod q. Ковзний хеш: hash(T[i+1..i+m]) перераховується з hash(T[i..i+m−1]) за O(1): видаляємо старий символ, додаємо новий. Порівнюємо лише при збігу хешів. <em>Хибні спрацювання</em> (false positives) перевіряємо посимвольно. O(n+m) expected. Корисний для пошуку k рівних за довжиною патернів одночасно (один прохід).</p>
`
},
{
t:"Динамічне програмування. Жадібні алгоритми.",
b:`
<h3>Динамічне програмування (ДП)</h3>
<p>Застосовується коли є: (1) <strong>оптимальна підструктура</strong> — оптимальне рішення задачі містить оптимальні рішення підзадач; (2) <strong>перекриваючі підзадачі</strong> — одні й ті ж підзадачі вирішуються багаторазово.</p>
<p>Підходи: <em>top-down (мемоізація)</em> — рекурсія + кеш; <em>bottom-up (таблиця)</em> — заповнення у правильному порядку без рекурсії (ефективніше по константах).</p>

<h3>Класичні задачі ДП</h3>
<p><strong>LCS (Longest Common Subsequence):</strong> dp[i][j] = довжина LCS рядків A[1..i] і B[1..j]. Якщо A[i]=B[j]: dp[i][j]=dp[i−1][j−1]+1. Інакше: max(dp[i−1][j], dp[i][j−1]). O(mn) час і пам'ять.</p>
<p><strong>Задача про рюкзак (0/1 Knapsack):</strong> dp[i][w] = максимальна цінність серед перших i предметів при ємності w. dp[i][w] = max(dp[i−1][w], v_i+dp[i−1][w−w_i]). O(nW).</p>
<p><strong>Множення ланцюжка матриць:</strong> dp[i][j] = мінімальна кількість операцій для A_i×…×A_j. dp[i][j] = min_{i≤k<j}(dp[i][k]+dp[k+1][j]+p_{i−1}·pₖ·p_j). O(n³).</p>
<p><strong>Редакційна відстань (Edit Distance):</strong> dp[i][j] = мінімальна кількість insert/delete/replace для перетворення A[1..i] в B[1..j]. O(mn).</p>

<h3>Жадібні алгоритми</h3>
<p>На кожному кроці робимо <em>локально оптимальний</em> вибір у надії отримати глобальний оптимум. На відміну від ДП — не розглядаємо всі підзадачі.</p>
<p>Для коректності потрібно довести: (1) <strong>Властивість жадібного вибору:</strong> існує оптимальне рішення, що включає жадібний вибір. (2) <strong>Оптимальна підструктура.</strong></p>
<p><strong>Задача розкладу активностей (Interval Scheduling):</strong> обрати максимальну кількість неперекривальних відрізків. Жадібно: завжди брати відрізок із найраннішим кінцем. Доведення: обмінний аргумент (exchange argument).</p>
<p><strong>Код Гаффмана:</strong> оптимальний префіксний код (для стиснення). Жадібно будуємо дерево: на кожному кроці об'єднуємо два найменш частих символи. O(n log n).</p>
<div class="warn">Жадібні алгоритми не завжди дають оптимум — наприклад, задача про рюкзак (0/1) вимагає ДП, а не жадібного підходу. Для дробового рюкзака жадібний — оптимальний.</div>
`
},
{
t:"Графи, їх представлення. Обходи. Найкоротші шляхи. Мінімальне кістякове дерево.",
b:`
<h3>Графи та представлення</h3>
<p>Граф G = (V, E). Орієнтований / неорієнтований, зважений / незважений. |V|=n, |E|=m.</p>
<p><strong>Матриця суміжності:</strong> A[i][j]=1 (або вага) якщо (i,j)∈E. O(n²) пам'ять. O(1) перевірка ребра. Погано для розріджених (m≪n²) графів.</p>
<p><strong>Список суміжності:</strong> для кожного v — список сусідів adj[v]. O(n+m) пам'ять. O(deg(v)) перевірка ребра. Стандарт для алгоритмів на графах.</p>

<h3>Обхід у ширину (BFS)</h3>
<p>Черга. Рівень за рівнем. O(V+E). <em>Властивість:</em> d[v] = відстань (кількість ребер) від джерела s до v у незваженому графі. Застосування: найкоротший шлях у незваженому, перевірка дводольності, компоненти зв'язності.</p>

<h3>Обхід у глибину (DFS)</h3>
<p>Рекурсія або явний стек. O(V+E). Класифікація ребер: tree, back, forward, cross. Час виявлення d[v] і закриття f[v].</p>
<p><strong>Топологічне сортування</strong> (для DAG): DFS, записати вершини у порядку спадання f[v]. O(V+E).</p>
<p><strong>Компоненти сильної зв'язності (SCC)</strong> алгоритм Косарайю: (1) DFS на G, отримати порядок f[v]; (2) DFS на Gᵀ (транспонований граф) у порядку спадання f[v] — кожне DFS-дерево = SCC. O(V+E).</p>

<h3>Найкоротші шляхи</h3>
<p><strong>Дейкстра:</strong> невід'ємні ваги. min-priority queue з d[v] як ключем. Greedy: на кожному кроці витягуємо v з мінімальним d[v], «розслаблюємо» ребра з v. З binary heap: O((V+E)log V). Коректність: інваріант — при витяганні v, d[v] вже остаточний.</p>
<p><strong>Беллман-Форд:</strong> від'ємні ребра. V−1 ітерацій розслаблення всіх ребер. O(VE). Після V−1 ітерацій: якщо ще можна розслабити → від'ємний цикл.</p>
<p><strong>Floyd-Warshall:</strong> dp[k][i][j] = найкоротший шлях від i до j через проміжні вершини {1,…,k}. dp[k][i][j] = min(dp[k−1][i][j], dp[k−1][i][k]+dp[k−1][k][j]). O(V³). Простий код, але O(V²) пам'яті.</p>

<h3>Мінімальне кістякове дерево (MST)</h3>
<p><strong>Алгоритм Крускала:</strong> відсортувати ребра за вагою; жадібно додавати ребро якщо воно не утворює цикл (union-find). O(E log E). Ефективний для розріджених графів.</p>
<p><strong>Алгоритм Прима:</strong> підтримувати відрізане дерево; на кожному кроці додавати ребро мінімальної ваги, що виходить з дерева (min-heap зі «стартовою» вагою кожної вершини). O(E log V) з binary heap. Ефективніший для щільних графів.</p>
<div class="note">Коректність обох алгоритмів випливає з теореми про розрізи (Cut theorem): для будь-якого розрізу мінімальне ребро, що перетинає розріз, обов'язково входить в MST.</div>
`
}
],
[
{t:"Об'єкти та класи. Поля та методи. Статичні поля та методи.",b:`<h3>Клас і об'єкт</h3><p><strong>Клас</strong> — тип даних, що описує структуру (поля) та поведінку (методи). <strong>Об'єкт</strong> — конкретний екземпляр у пам'яті з власним станом. Кожен нестатичний метод отримує неявний параметр <code>this</code> — вказівник на поточний об'єкт. <code>const</code>-методи не змінюють стан.</p><pre>class BankAccount {
    double balance;
    string owner;
public:
    void deposit(double x) { balance += x; }
    double getBalance() const { return balance; }
};</pre><h3>Статичні поля та методи</h3><p><strong>Статичне поле</strong> — одна копія на клас. Ініціалізується поза класом у .cpp. Типово: лічильник екземплярів, спільний кеш.</p><pre>class Counter {
    static int count;
public:
    Counter() { ++count; }
    ~Counter() { --count; }
    static int getCount() { return count; }
};
int Counter::count = 0;</pre><p><strong>Статичний метод</strong>: немає <code>this</code>, не може звертатись до нестатичних членів. Виклик: <code>Counter::getCount()</code>. Використовується для factory-методів, utility-функцій.</p>`},

{t:"Життєвий цикл об'єкта. Конструктори та деструктори. Stack vs Heap.",b:`<h3>Конструктори</h3><p>Викликається автоматично при створенні. <strong>Список ініціалізації</strong> (<code>: field(value)</code>) виконується до тіла — обов'язковий для const і reference полів, ефективніший для складних типів.</p><pre>class Point {
    double x, y;
public:
    Point() : x(0), y(0) {}
    Point(double x, double y) : x(x), y(y) {}
    Point(const Point&) = default;   // copy
    Point(Point&&) = default;        // move (C++11)
};</pre><h3>Деструктор</h3><p>~ClassName() — без аргументів, без повернення. Автоматично викликається. При ієрархії — обов'язково <code>virtual</code>.</p><h3>Stack vs Heap</h3><p><strong>Stack:</strong> знищується при виході зі scope, O(1) виділення (зміна SP), обмежений розмір (~8 МБ). <strong>Heap:</strong> new/delete, гнучкий розмір, повільніше (malloc), ручне управління → smart pointers.</p><pre>void f() {
    Point p(1.0, 2.0);   // stack: ~Point() автоматично
    auto q = std::make_unique&lt;Point&gt;(3.0, 4.0); // heap, safe
}
</pre><p><strong>Порядок:</strong> бази (у порядку оголошення) → поля → тіло ctor. Dtor — зворотній.</p>`},

{t:"Інкапсуляція. Модифікатори доступу.",b:`<h3>Інкапсуляція</h3><p>Приховування деталей реалізації за стабільним інтерфейсом. Дозволяє змінювати реалізацію без зміни клієнтського коду. Зменшує зв'язність.</p><h3>Модифікатори доступу (C++)</h3><ul><li><strong>public:</strong> доступний звідусіль — публічний API.</li><li><strong>protected:</strong> клас + підкласи. Для «гачків» у Template Method.</li><li><strong>private:</strong> лише клас + friend. У <code>class</code> — за замовчуванням; у <code>struct</code> — public.</li></ul><pre>class Rectangle {
    double w, h;           // private
public:
    double area() const { return w * h; }
    void setWidth(double v) { if (v > 0) w = v; }
protected:
    void onResize() {}     // для підкласів
};</pre><p>Java: ще package-private (без модифікатора). Python: конвенції <code>_protected</code>, <code>__name_mangling</code>. <strong>friend</strong>: клас або функція з доступом до private/protected — використовувати обережно.</p>`},

{t:"Успадкування. Базові класи. Віртуальні методи. Абстрактні класи. Чи бувають конструктори/деструктори віртуальними?",b:`<h3>Успадкування</h3><p>Нащадок отримує поля та методи базового класу. Відношення is-a: Dog is-a Animal.</p><pre>class Animal {
public:
    virtual void speak() const { cout &lt;&lt; "..."; }
    virtual ~Animal() {}   // обов'язково virtual!
};
class Dog : public Animal {
public:
    void speak() const override { cout &lt;&lt; "Woof"; }
};</pre><h3>Vtable та динамічна диспетчеризація</h3><p>Без <code>virtual</code> — статичний dispatch за типом вказівника. З <code>virtual</code> — runtime через vtable. <strong>Механізм:</strong> кожен клас з virtual-методами має vtable (масив вказівників). Об'єкт зберігає <code>vptr</code> → своя vtable. Виклик: 1 розіменування + 1 indirect call.</p><h3>Абстрактні класи</h3><pre>class Shape {
public:
    virtual double area() const = 0;  // чисто віртуальний
    virtual ~Shape() {}
};
// Shape s; // помилка — не можна створити</pre><h3>Конструктори та деструктори</h3><p><strong>Конструктори — не бувають virtual.</strong> Під час конструювання vptr ще вказує на vtable бази. Поліморфне «конструювання» — через Factory Method або clone().</p><p><strong>Деструктори — обов'язково virtual у поліморфних базах.</strong> Без цього <code>delete base_ptr</code> → лише ~Base(), деструктор нащадка не викликається → витік / UB. Правило: є хоч один virtual метод → деструктор теж virtual.</p>`},

{t:"Поліморфізм. Статичний та динамічний. Динамічний на основі ієрархії класів.",b:`<h3>Статичний поліморфізм (compile-time)</h3><p>Вирішується компілятором — zero runtime overhead.</p><ul><li><strong>Перевантаження (overloading):</strong> <code>print(int)</code>, <code>print(double)</code>, <code>print(string)</code> — компілятор обирає за типом аргументів.</li><li><strong>Шаблони (templates):</strong> <code>std::sort</code> для будь-якого RandomAccessIterator.</li><li><strong>CRTP:</strong> статична диспетчеризація без vtable (детально в питанні 6).</li></ul><h3>Динамічний поліморфізм (runtime)</h3><pre>void makeSpeak(const Animal& a) {
    a.speak();  // Dog::speak або Cat::speak — залежить від об'єкта
}
Dog d; Cat c;
makeSpeak(d);  // Woof
makeSpeak(c);  // Meow</pre><p>Код <code>makeSpeak</code> не знає про конкретні типи — нові підкласи без зміни коду (принцип OCP). Overhead vtable-виклику: ~1–3 нс.</p><h3>Порівняння</h3><ul><li>Статичний: швидший, але code bloat від template instantiation, типи відомі до компіляції.</li><li>Динамічний: гнучкіший, плагіни, відкриті системи, але overhead і неможливість inline.</li></ul>`},

{t:"Шаблони (templates/generics). Статичний поліморфізм.",b:`<h3>Шаблони функцій</h3><pre>template&lt;typename T&gt;
T max_val(T a, T b) { return a > b ? a : b; }
// Компілятор генерує max_val&lt;int&gt;, max_val&lt;double&gt;, ... при першому використанні</pre><p>Type deduction: тип T визначається автоматично з аргументів. Явна вказівка: <code>max_val&lt;int&gt;(3.5, 2.1)</code>.</p><h3>Шаблони класів</h3><pre>template&lt;typename T, size_t N&gt;
class Stack {
    T data[N]; int top = -1;
public:
    void push(const T& v) { data[++top] = v; }
    T pop() { return data[top--]; }
};
Stack&lt;int, 100&gt; s;</pre><h3>Спеціалізація</h3><pre>template&lt;&gt;                             // повна
bool max_val(bool a, bool b) { return a || b; }</pre><h3>CRTP (Curiously Recurring Template Pattern)</h3><pre>template&lt;typename Derived&gt;
class Base {
public:
    void interface() {
        static_cast&lt;Derived*&gt;(this)->implementation();
    }
};
class Child : public Base&lt;Child&gt; {
public:
    void implementation() { /* ... */ }
};</pre><p>Overhead нуль. Недолік: не можна зберігати різні нащадки в <code>Base*</code> — кожен нащадок різного типу.</p><h3>Концепти (C++20)</h3><pre>template&lt;typename T&gt;
concept Sortable = requires(T a, T b) { a &lt; b; };
template&lt;Sortable T&gt;
void mySort(std::vector&lt;T&gt;& v) { /* ... */ }</pre><p>Зрозумілі помилки компіляції замість криптичних template errors.</p>`},

{t:"Успадкування інтерфейсу та реалізації. Public/private. Успадкування vs композиція.",b:`<h3>Public успадкування (is-a)</h3><p>Dog is-a Animal — семантично правильне. Публічний інтерфейс бази доступний ззовні. Клієнт може використовувати Dog де очікується Animal (LSP).</p><h3>Private успадкування (implemented-in-terms-of)</h3><p>Деталь реалізації — не is-a. Публічний інтерфейс бази стає private у нащадку.</p><pre>class Stack : private std::vector&lt;int&gt; {
public:
    void push(int v) { push_back(v); }
    int pop() { int v=back(); pop_back(); return v; }
    // push_back, size, etc. — недоступні клієнтам
};</pre><h3>using — відновлення доступу</h3><pre>class MyStack : private std::vector&lt;int&gt; {
public:
    using std::vector&lt;int&gt;::size;   // тільки size() публічний
};</pre><h3>Композиція (has-a)</h3><pre>class Engine { public: void start(); };
class Car {
    Engine engine;        // has-a
public:
    void drive() { engine.start(); }
};</pre><p><em>Prefer composition over inheritance:</em> слабший зв'язок, легше тестувати (mock), легше замінити реалізацію. Успадкування — коли is-a справді виконується і потрібен поліморфізм.</p>`},

{t:"Множинне успадкування. Diamond problem. Віртуальне успадкування.",b:`<h3>Множинне успадкування</h3><p>C++ підтримує: <code>class C : public A, public B</code>. Java — лише інтерфейси. Python — MRO (C3-linearization).</p><h3>Diamond Problem</h3><pre>      Animal
      /    \
   Dog     Cat
      \    /
      DogCat    // два підоб'єкти Animal → неоднозначність</pre><p>DogCat::name → ambiguity. Можна уточнити <code>dogcat.Dog::name</code>, але незручно.</p><h3>Вирішення — Virtual Inheritance</h3><pre>class Animal { public: string name; };
class Dog : virtual public Animal {};
class Cat : virtual public Animal {};
class DogCat : public Dog, public Cat {};
// DogCat має ОДИН підоб'єкт Animal</pre><p>При virtual inheritance: конструктор Animal викликається найпохіднішим класом (DogCat). Overhead: vbase-pointer у кожному Dog/Cat об'єкті.</p><div class="warn">Diamond — сигнал поганого дизайну. Краще: рефакторинг через чисті інтерфейси (абстрактні класи без полів) або композицію.</div>`},

{t:"Керування пам'яттю. Проблеми. RAII. Smart pointers.",b:`<h3>Проблеми ручного керування</h3><ul><li><strong>Memory leak:</strong> new без delete → пам'ять не повертається до завершення процесу.</li><li><strong>Dangling pointer:</strong> вказівник на звільнену пам'ять → UB при читанні.</li><li><strong>Double-free:</strong> delete двічі → heap corruption.</li><li><strong>Use-after-free:</strong> використання після delete → UB.</li></ul><h3>RAII</h3><p>Ресурс захоплюється в конструкторі, звільняється в деструкторі. Деструктор викликається автоматично (навіть при throw) → ресурс завжди звільняється.</p><pre>class FileHandle {
    FILE* f;
public:
    FileHandle(const char* n) : f(fopen(n,"r")) {
        if (!f) throw std::runtime_error("Cannot open");
    }
    ~FileHandle() { if (f) fclose(f); }
};</pre><h3>Smart Pointers (C++11)</h3><p><strong>unique_ptr&lt;T&gt;:</strong> єдиний власник. Не копіюється, лише переміщується. Zero overhead.</p><pre>auto p = std::make_unique&lt;Widget&gt;(args);
auto q = std::move(p);  // p = nullptr</pre><p><strong>shared_ptr&lt;T&gt;:</strong> спільне володіння, reference counting. Знищується при count=0. Overhead: атомарний лічильник.</p><p><strong>weak_ptr&lt;T&gt;:</strong> не збільшує refcount. Для розриву циклічних посилань (A→shared B→shared A). <code>lock()</code> → shared_ptr або nullptr.</p><div class="note">Правило: уникай raw new/delete. Використовуй make_unique за замовчуванням; make_shared коли потрібне спільне володіння.</div>`},

{t:"Механізми обробки помилок. Exceptions. Assert. Алгебраїчні типи даних.",b:`<h3>Assert</h3><p><code>assert(cond)</code> — debug-режим, при false → termination. Вимикається -DNDEBUG. Для програмних помилок (порушення передумов), не для runtime-помилок.</p><h3>Exceptions</h3><p><strong>Stack unwinding:</strong> при throw деструктори всіх локальних об'єктів викликаються → RAII гарантує коректне звільнення ресурсів.</p><pre>void readFile(const string& path) {
    auto f = std::make_unique&lt;File&gt;(path);  // RAII
    if (err) throw std::runtime_error("oops");
    // ~File() викличеться в будь-якому разі
}
try { readFile("data.txt"); }
catch (const std::exception& e) { cerr &lt;&lt; e.what(); }</pre><p><code>noexcept</code> — гарантія відсутності → компілятор оптимізує. Move-конструктори зазвичай noexcept.</p><h3>Алгебраїчні типи даних</h3><p><strong>std::optional&lt;T&gt;:</strong> значення або nullopt.</p><pre>std::optional&lt;int&gt; parseAge(const string& s) {
    try { return std::stoi(s); }
    catch (...) { return std::nullopt; }
}
if (auto age = parseAge("25")) cout &lt;&lt; *age;</pre><p><strong>std::expected&lt;T,E&gt;</strong> (C++23): Ok(T) або Err(E) без виключення. У Rust: Result&lt;T,E&gt;, Option&lt;T&gt; — компілятор примушує обробляти.</p>`},

{t:"Системи контролю версій.",b:`<h3>Навіщо VCS</h3><p>Повна історія змін, паралельна розробка, відкат, bisect для пошуку регресій.</p><h3>Централізовані (CVCS)</h3><p>SVN, Perforce — єдиний сервер. Прості, але залежність від мережі; branching дорогий.</p><h3>Розподілені (DVCS)</h3><p>Git, Mercurial — кожен клон = повне репо. Commit, log, diff — локально (мілісекунди). Робота offline.</p><h3>Git — ключові концепції</h3><p><strong>Об'єктна модель:</strong> blob (файл), tree (директорія), commit (знімок + метадані + батьківські коміти), tag. Всі об'єкти — SHA-1, незмінні.</p><p><strong>Три зони:</strong> working tree → index/staging → repository.</p><p><strong>Branch:</strong> просто вказівник на commit. HEAD → поточна гілка.</p><pre>git checkout -b feature/auth
git add -p                      # інтерактивний staging
git commit -m "Add JWT auth"
git rebase main                 # лінійна історія
git push origin feature/auth</pre><p><strong>Merge vs Rebase:</strong> merge → merge commit, зберігає структуру. Rebase → перезаписує коміти поверх main, чистіша лінійна історія, але змінює SHA (не для публічних гілок).</p><p><strong>Корисні команди:</strong> git bisect (бінарний пошук регресії), git blame, git stash, git reflog (журнал HEAD).</p>`},

{t:"Тестування коду. Модульні тести. Фреймворки.",b:`<h3>Рівні тестування</h3><ul><li><strong>Unit:</strong> ізольована одиниця. Швидко, детерміновано.</li><li><strong>Integration:</strong> взаємодія компонентів (сервіс + БД).</li><li><strong>System / E2E:</strong> вся система від UI до БД.</li><li><strong>Acceptance (UAT):</strong> відповідність бізнес-вимогам.</li></ul><h3>FIRST — властивості хороших unit-тестів</h3><ul><li>Fast — мілісекунди</li><li>Isolated — незалежні від порядку і від інших тестів</li><li>Repeatable — однаковий результат на будь-якій машині</li><li>Self-validating — автоматично pass/fail</li><li>Timely — пишуться разом із кодом</li></ul><h3>AAA-патерн</h3><pre>TEST(BankAccount, DepositIncreasesBalance) {
    BankAccount acc(100.0);         // Arrange
    acc.deposit(50.0);              // Act
    EXPECT_DOUBLE_EQ(acc.balance(), 150.0); // Assert
}</pre><h3>Test Doubles</h3><ul><li><strong>Stub:</strong> фіксовані дані.</li><li><strong>Mock:</strong> перевіряє виклики методів.</li><li><strong>Fake:</strong> спрощена реалізація (in-memory DB).</li><li><strong>Spy:</strong> реальна реалізація + запис викликів.</li></ul><h3>Фреймворки</h3><ul><li>C++: Google Test / gMock, Catch2, doctest.</li><li>Java: JUnit 5, Mockito.</li><li>Python: pytest.</li><li>JS/TS: Jest, Vitest.</li></ul><p><strong>TDD:</strong> Red → Green → Refactor. <strong>Coverage:</strong> 80–90% — хороший орієнтир; важлива якість тестів, а не відсоток.</p>`},

{t:"Документування коду. Doxygen.",b:`<h3>Принципи</h3><p>Коментарі пояснюють <em>що</em> і <em>навіщо</em>, не <em>як</em>. Документувати публічний API обов'язково. Застаріла документація гірша за відсутню — підтримувати актуальність.</p><h3>Doxygen</h3><p>Генерує HTML/PDF/LaTeX з анотованого C/C++/Java коду. Підтримує Graphviz для діаграм залежностей.</p><pre>/**
 * @brief Обчислює відстань між двома точками.
 * @param a Перша точка у 2D-просторі.
 * @param b Друга точка.
 * @return Евклідова відстань >= 0.
 * @throws std::invalid_argument якщо координати NaN.
 * @see Point::distanceTo()
 */
double distance(Point a, Point b);</pre><p>Стилі: <code>/** ... */</code> або <code>/// однорядковий</code>. Конфігурація через Doxyfile.</p><p>Важливі теги: @brief, @param[in/out], @return, @throws, @note, @warning, @see, @code...@endcode, @deprecated.</p><h3>Аналоги</h3><ul><li><strong>Javadoc</strong> — Java, вбудований у JDK.</li><li><strong>Sphinx</strong> — Python, reStructuredText / Google-style docstrings.</li><li><strong>TSDoc / JSDoc</strong> — TypeScript/JavaScript.</li><li><strong>rustdoc</strong> — Rust, Markdown у <code>///</code>, тести в документації.</li></ul>`},

{t:"Моделювання програмних систем. Мова UML. Основні типи діаграм.",b:`<h3>UML</h3><p>Unified Modeling Language — стандарт OMG. UML 2.x: 14 типів діаграм, 2 категорії.</p><h3>Структурні діаграми</h3><p><strong>Class diagram:</strong> класи, поля, методи, відношення:</p><ul><li>Асоціація (→): загальний зв'язок, кардинальність 1..*, 0..1.</li><li>Агрегація (◇→): ціле-частина, частина існує незалежно.</li><li>Композиція (◆→): частина не існує без цілого.</li><li>Залежність (--→): тимчасове використання (параметр методу).</li><li>Узагальнення (—△): is-a (успадкування).</li><li>Реалізація (--△): клас реалізує інтерфейс.</li></ul><p><strong>Component, Deployment, Package</strong> — архітектурні та розгортувальні діаграми.</p><h3>Поведінкові діаграми</h3><p><strong>Use Case:</strong> актори + сценарії. Що система робить (не як). Для комунікації з замовником.</p><p><strong>Sequence:</strong> вертикальні lifelines, горизонтальні стрілки-повідомлення зверху вниз. Фрагменти: alt (if/else), loop, opt, par.</p><p><strong>State Machine:</strong> стани (округлені прямокутники), переходи з умовами/діями. Для протоколів, UI, embedded.</p><p><strong>Activity:</strong> потоки управління, fork/join, decision. Близько до flowchart + паралелізм.</p>`},

{t:"Основні принципи розробки. KISS, DRY, абстракції.",b:`<h3>KISS (Keep It Simple, Stupid)</h3><p>Найпростіше рішення — найкраще. Складність ускладнює розуміння, тестування, підтримку. Перевірка: чи зміг би junior зрозуміти за 5 хвилин? Не додавати шарів «про всяк випадок».</p><h3>DRY (Don't Repeat Yourself)</h3><p>«Кожна одиниця знання — єдине авторитетне представлення» (Хант і Томас). Дублювання → баги треба виправляти в кількох місцях. Але: іноді дублювання краще за погану абстракцію (Sandi Metz: «duplication is far cheaper than the wrong abstraction»).</p><h3>YAGNI (You Aren't Gonna Need It)</h3><p>Не реалізовувати функціонал «на майбутнє». Кожен зайвий код треба писати, тестувати, підтримувати. «Може знадобиться» — майже ніколи не потрібне у тому вигляді.</p><h3>Separation of Concerns (SoC)</h3><p>Кожен модуль — один аспект. UI відокремлено від бізнес-логіки від персистентності. Основа MVC, Clean Architecture, DDD.</p><h3>Принцип абстракції</h3><p>Приховувати деталі за стабільним інтерфейсом. «Програмуй до інтерфейсу, а не до реалізації» (GoF). Рівні абстракцій не мають змішуватись в одній функції.</p>`},

{t:"Принципи SOLID.",b:`<h3>S — Single Responsibility Principle</h3><p>Клас має одну причину для зміни. Причина = актор, зацікавлений у функціональності.</p><pre>// Порушення: три відповідальності
class User { void save(); void sendEmail(); void generateReport(); };
// Правильно:
class UserRepository { void save(User); };
class EmailService { void send(User); };
class ReportGenerator { Report generate(User); };</pre><h3>O — Open/Closed Principle</h3><p>Відкритий для розширення, закритий для модифікації. Нова поведінка — через нові класи.</p><pre>// Погано: if/else для кожного shape
// Добре:
class Shape { virtual double area() const = 0; };
class Circle : Shape { double area() const override { return M_PI*r*r; } };</pre><h3>L — Liskov Substitution Principle</h3><p>Підтип замінює базовий без порушення коректності. Preconditions не посилюються, postconditions не послаблюються. Класичне порушення: Square наслідує Rectangle — setWidth порушує інваріант.</p><h3>I — Interface Segregation Principle</h3><p>Кілька вузьких інтерфейсів краще за один широкий. Клієнт не залежить від методів, що не використовує.</p><pre>// Погано: Worker: work() + eat() + sleep() — Robot не їсть
// Добре: Workable: work(); Eatable: eat()</pre><h3>D — Dependency Inversion Principle</h3><p>High-level і low-level модулі залежать від абстракцій, не один від одного.</p><pre>// Погано: UserService залежить від MySQLUserRepo напряму
// Добре:
interface UserRepository { User findById(int); }
class UserService { UserRepository& repo; }  // DI через ctor
class MySQLUserRepo implements UserRepository { ... };</pre>`},

{t:"Патерни проєктування. Породжувальні, структурні, поведінкові.",b:`<h3>Породжувальні (Creational)</h3><p><strong>Singleton:</strong> один екземпляр. Thread-safe в C++11 через статичну локальну змінну. Антипатерн при зловживанні — ускладнює тестування.</p><p><strong>Factory Method:</strong> базовий клас визначає метод для створення, нащадки — який саме клас. Відокремлює клієнта від конкретних класів.</p><p><strong>Abstract Factory:</strong> інтерфейс для сімейств об'єктів. GUIFactory: WindowsFactory (WinButton, WinCheckbox) або MacFactory.</p><p><strong>Builder:</strong> покрокове будування складного об'єкта. Fluent: <code>Pizza::builder().size(L).topping("pepperoni").build()</code>.</p><p><strong>Prototype:</strong> клонування через <code>clone()</code>. Коли створення з нуля дорожче за копіювання.</p><h3>Структурні (Structural)</h3><p><strong>Adapter:</strong> несумісні інтерфейси — обгортка. <strong>Bridge:</strong> абстракція ↔ реалізація незалежно. <strong>Composite:</strong> дерево з однаковим інтерфейсом для листка і гілки (файл і директорія — getSize()). <strong>Decorator:</strong> динамічне додавання функціональності (BufferedReader(FileReader)). <strong>Facade:</strong> спрощений інтерфейс до підсистеми. <strong>Proxy:</strong> lazy init, кешування, контроль доступу, логування.</p><h3>Поведінкові (Behavioral)</h3><p><strong>Observer:</strong> підписка на події (EventEmitter, Qt signals). <strong>Strategy:</strong> взаємозамінні алгоритми (BubbleSort | QuickSort). <strong>Command:</strong> запит як об'єкт, undo/redo. <strong>Template Method:</strong> алгоритм у базі, кроки-гачки у нащадках. <strong>State:</strong> поведінка залежно від стану (IdleState, SelectingState). <strong>Iterator:</strong> обхід без розкриття структури (range-for у C++). <strong>Chain of Responsibility, Mediator, Memento, Visitor.</strong></p>`},

{t:"Паралельне мультипоточне програмування. Потоки vs процеси.",b:`<h3>Процеси</h3><p>Ізольований адресний простір, власні ресурси. Дороге перемикання контексту (MMU). Комунікація: IPC — pipe, socket, shared memory, message queue.</p><h3>Потоки</h3><p>Ділять адресний простір процесу. Власний: стек, registers, TLS. Перемикання дешевше. Спільна пам'ять → race conditions.</p><pre>// Race condition без синхронізації:
int counter = 0;
// Thread 1: read(0), increment, write(1)
// Thread 2: read(0), increment, write(1)
// Результат: 1 замість 2!</pre><h3>Класифікація проблем</h3><ul><li><strong>Race condition:</strong> результат залежить від порядку виконання.</li><li><strong>Deadlock:</strong> два потоки чекають mutex один одного — вічно.</li><li><strong>Livelock:</strong> активні, але без прогресу (відповідають на дії один одного).</li><li><strong>Starvation:</strong> потік ніколи не отримує ресурсу.</li><li><strong>Priority inversion:</strong> низькопріоритетний тримає mutex, який чекає високопріоритетний.</li></ul><h3>Переваги потоків</h3><p>Паралелізм на multicores, async I/O без блокування, responsiveness UI (відокремлений UI-thread).</p>`},

{t:"Створення та керування потоками.",b:`<h3>POSIX threads</h3><pre>pthread_t t;
pthread_create(&t, nullptr, threadFunc, arg);
pthread_join(t, &retval);
pthread_detach(t);</pre><h3>C++11 std::thread</h3><pre>#include &lt;thread&gt;
void worker(int id) { /* ... */ }
std::thread t(worker, 42);
t.join();     // чекати завершення
// t.detach(); // daemon</pre><p>Якщо thread знищується без join/detach → <code>std::terminate()</code>. <strong>std::jthread</strong> (C++20): RAII — автоматично join у деструкторі + stop_token для скасування.</p><h3>Thread pool</h3><p>N потоків обробляє чергу завдань. Уникає overhead (~50–100 мкс) на кожне. C++ стандарт не має вбудованого пулу — std::async (може), Intel TBB, BS::thread_pool.</p><h3>std::async / std::future</h3><pre>#include &lt;future&gt;
auto fut = std::async(std::launch::async, []{ return compute(); });
int result = fut.get();  // блокує якщо ще не готово</pre><p><code>std::promise&lt;T&gt;</code>: producer встановлює через promise, consumer отримує через future.get().</p><h3>Coroutines (C++20)</h3><p>co_await, co_yield, co_return. Suspend/resume без переключення контексту. Основа сучасних async-фреймворків.</p>`},

{t:"Механізми синхронізації потоків (lock, mutex, condition variable).",b:`<h3>Mutex</h3><pre>#include &lt;mutex&gt;
std::mutex m;
int shared = 0;
void increment() {
    std::lock_guard&lt;std::mutex&gt; lock(m);  // RAII
    ++shared;
}  // m.unlock() автоматично</pre><p><strong>unique_lock:</strong> defer_lock, try_lock, timed_lock, явний unlock/lock. <strong>recursive_mutex:</strong> один потік може захопити кілька разів.</p><h3>Deadlock та запобігання</h3><pre>// Deadlock:
Thread 1: lock(m1); lock(m2);  // чекає m2
Thread 2: lock(m2); lock(m1);  // чекає m1</pre><p>Запобігання: (1) захоплювати у постійному порядку; (2) <code>std::lock(m1, m2)</code> — атомарно; (3) <code>std::scoped_lock{m1,m2}</code> (C++17).</p><h3>Condition Variable</h3><pre>std::mutex m;
std::condition_variable cv;
std::queue&lt;Task&gt; tasks;

// Producer:
{ std::lock_guard lock(m); tasks.push(task); }
cv.notify_one();

// Consumer:
{ std::unique_lock lock(m);
  cv.wait(lock, []{ return !tasks.empty(); });
  // атомарно: unlock + sleep; при notify: lock + check predicate
  auto t = tasks.front(); tasks.pop(); }</pre><p><strong>Spurious wakeup:</strong> wait може повернутись без notify → predicate обов'язковий.</p><h3>std::atomic</h3><pre>std::atomic&lt;int&gt; cnt{0};
++cnt;   // атомарно, без гонки</pre><p>Memory ordering: relaxed (лише атомарність), acquire/release (синхронізація), seq_cst (за замовчуванням). <strong>shared_mutex</strong> (C++17): readers-writer lock — кілька читачів або один письменник.</p>`}
],

{t:"ER-модель.",b:`<h3>Призначення</h3><p>Entity-Relationship модель — Пітер Чен, 1976. Концептуальна модель для проєктування БД незалежно від СУБД. Описує предметну область у зрозумілій формі.</p><h3>Основні поняття</h3><p><strong>Сутність (Entity):</strong> об'єкт реального світу — Студент, Курс, Замовлення. Прямокутник. <strong>Атрибут:</strong> властивість сутності. Еліпс. Ключовий — підкреслено. Типи: простий, складений (Адреса = Місто+Вулиця), багатозначний (подвійний еліпс), похідний (штриховий — Вік з ДатаНародження).</p><p><strong>Зв'язок (Relationship):</strong> асоціація між сутностями. Ромб. Кардинальність: 1:1, 1:N, M:N.</p><p><strong>Слабка сутність:</strong> без власного ключа, ідентифікується через зв'язок із сильною + розрізнювач. Подвійний прямокутник. Наприклад: Кімната (номер) від Готелю.</p><h3>ER → Реляційна схема</h3><ul><li>Сутність → таблиця (атрибути → стовпці, ключ → PK).</li><li>Зв'язок 1:N → FK у таблиці N-сторони.</li><li>Зв'язок M:N → окрема таблиця з двома FK + атрибути зв'язку.</li><li>Зв'язок 1:1 → FK в одній із таблиць.</li><li>Слабка → FK на сильну + розрізнювач як частина PK.</li></ul>`},

{t:"Поняття БД, основні властивості.",b:`<h3>Визначення</h3><p><strong>БД</strong> — організована, постійна, спільно використовувана колекція пов'язаних даних і метаданих, керована СУБД. <strong>СУБД</strong> — забезпечує DDL, DML, захист, відновлення, паралельний доступ.</p><h3>Основні властивості</h3><ul><li><strong>Цілісність:</strong> обмеження — NOT NULL, UNIQUE, FK, CHECK, domain.</li><li><strong>Незалежність даних:</strong> логічна (зміна view ≠ зміна схеми); фізична (додати індекс ≠ змінити програми).</li><li><strong>Спільне використання:</strong> concurrency, ізоляція транзакцій.</li><li><strong>Відновлення після збоїв:</strong> ACID + WAL (Write-Ahead Log).</li><li><strong>Контроль доступу:</strong> аутентифікація, GRANT/REVOKE, аудит.</li><li><strong>Мінімальна надлишковість:</strong> нормалізація.</li></ul><h3>ANSI/SPARC (3 рівні)</h3><ul><li><strong>Зовнішній:</strong> View конкретного користувача.</li><li><strong>Концептуальний:</strong> логічна схема всієї БД.</li><li><strong>Внутрішній:</strong> файли, індекси, сторінки.</li></ul>`},

{t:"Класифікація запитів.",b:`<h3>DDL — Data Definition Language</h3><pre>CREATE TABLE students (id SERIAL PRIMARY KEY, name VARCHAR(100) NOT NULL);
ALTER TABLE students ADD COLUMN gpa NUMERIC(3,2);
DROP TABLE students;
CREATE INDEX idx_name ON students(name);
TRUNCATE TABLE logs;</pre><h3>DML — Data Manipulation Language</h3><pre>SELECT name, gpa FROM students WHERE gpa > 3.5 ORDER BY gpa DESC;
INSERT INTO students (name, gpa) VALUES ('Іван', 3.8);
UPDATE students SET gpa = 4.0 WHERE id = 1;
DELETE FROM students WHERE gpa &lt; 2.0;</pre><h3>DCL та TCL</h3><pre>GRANT SELECT, INSERT ON students TO user_vasyl;
REVOKE INSERT ON students FROM user_vasyl;

BEGIN;
UPDATE accounts SET balance = balance - 100 WHERE id = 1;
UPDATE accounts SET balance = balance + 100 WHERE id = 2;
COMMIT;  -- або ROLLBACK</pre><h3>За складністю DML</h3><ul><li>Прості: SELECT з однієї таблиці.</li><li>JOIN-запити: кілька таблиць.</li><li>Підзапити: вкладені SELECT у WHERE/FROM/SELECT.</li><li>Агрегатні: GROUP BY + COUNT/SUM/AVG/MIN/MAX.</li><li>Вікнові: OVER(PARTITION BY ... ORDER BY ...).</li></ul>`},

{t:"Реляційна модель Кодда. Реляційна алгебра.",b:`<h3>Реляційна модель (Кодд, 1970)</h3><p>Дані у вигляді відношень — математичних множин кортежів. Ідеї: незалежність від фізичного розміщення; мова на теорії множин і логіці. <strong>Відношення R(A₁:D₁,…,Aₙ:Dₙ)</strong> — підмножина декартового добутку D₁×…×Dₙ. Без дублікатів, без порядку.</p><h3>Операції реляційної алгебри</h3><p><strong>σ (Selection):</strong> σ[P](R) — рядки, що задовольняють предикат. <code>σ[age>18](Students)</code></p><p><strong>π (Projection):</strong> π[A₁,…,Aₖ](R) — лише вказані стовпці, дублікати видаляються. <code>π[name,gpa](Students)</code></p><p><strong>× (Cartesian Product):</strong> всі комбінації кортежів. |R|=m, |S|=n → |R×S|=m·n.</p><p><strong>∪, ∩, \ (Теоретико-множинні):</strong> для сумісних відношень (однакова схема).</p><p><strong>⋈ (Natural Join):</strong> по спільних атрибутах. θ-join: σ[θ](R×S). Equijoin: θ = рівність.</p><p><strong>÷ (Division):</strong> R(X,Y) ÷ S(Y) → кортежі X, пов'язані з УСІМА кортежами S. «Студенти, що здали всі іспити зі списку».</p><p><strong>ρ (Rename):</strong> перейменування атрибутів.</p>`},

{t:"Реляційне числення. Мова ALPHA.",b:`<h3>Числення кортежів</h3><p>Декларативно: <em>що</em> хочемо, не <em>як</em>. Вираз: {t | P(t)} — кортежі t, для яких предикат P(t) істинний.</p><pre>{t | t ∈ Students ∧ t.gpa > 3.5}
-- студенти з GPA > 3.5

{t.name | t ∈ Students ∧ ∃e(e ∈ Exams ∧ e.student_id = t.id)}
-- імена студентів, що склали хоч один іспит</pre><h3>Числення доменів</h3><p>Змінні пробігають по значеннях атрибутів. Основа QBE.</p><pre>{&lt;n,g&gt; | &lt;n,g&gt; ∈ Students ∧ g > 3.5}</pre><h3>Мова ALPHA (Кодд)</h3><p>Перша практична мова на основі числення кортежів. Команди: GET, PUT, HOLD, UPDATE, DELETE, DROP. Range variables пробігають по відношеннях.</p><pre>RANGE OF T IS Students;
GET W (T.name, T.gpa) : T.gpa > 3.5</pre><p>ALPHA вплинула на QUEL (Ingres) → SQL. Числення і алгебра <em>еквівалентні</em> за виразною потужністю (теорема Кодда).</p>`},

{t:"Реляційна повнота. Теза Кодда.",b:`<h3>Реляційно повна мова</h3><p>Здатна виразити будь-який запит, що виражається реляційною алгеброю (або безпечним виразом числення). Мінімальна вимога до мови запитів СУБД.</p><h3>Теза Кодда</h3><p>«Будь-яка мова запитів, що реалізує всі 8 операцій реляційної алгебри, є реляційно повною і достатня для реляційної СУБД.» Методологічне твердження (аналогічно до тези Чорча в теорії обчислюваності).</p><h3>SQL та реляційна повнота</h3><p>SQL реляційно повний: SELECT = σ+π; JOIN = з'єднання; UNION/EXCEPT/INTERSECT = множинні операції; WHERE+subquery = ∃/∀ (EXISTS, ALL, ANY). SQL виходить за межі алгебри: ORDER BY, NULL (трьохзначна логіка), рекурсивні CTE (WITH RECURSIVE).</p><h3>Чому важливо</h3><p>Мова, що не виражає хоча б одну операцію (наприклад, не підтримує JOIN) — неповна. QBE, QUEL — теж реляційно повні. Повнота — не достатня умова: мова ще має бути ефективною і зручною.</p>`},

{t:"Мова SQL. Структура оператора SELECT.",b:`<h3>Повна структура</h3><pre>SELECT   [DISTINCT] { * | вираз [[AS] аліас], … }
FROM     таблиця [[AS] аліас]
         [JOIN таблиця ON умова]
[WHERE   умова]
[GROUP BY вираз, …]
[HAVING  умова]
[ORDER BY вираз [ASC|DESC] [NULLS FIRST|LAST], …]
[LIMIT n] [OFFSET m]</pre><h3>Логічний порядок виконання</h3><ol><li>FROM — джерело даних</li><li>JOIN — з'єднати таблиці</li><li>WHERE — фільтрувати рядки до групування</li><li>GROUP BY — згрупувати</li><li>HAVING — фільтрувати групи</li><li>SELECT — обчислити вирази</li><li>DISTINCT — видалити дублікати</li><li>ORDER BY — впорядкувати</li><li>LIMIT/OFFSET — обрізати</li></ol><div class="note">Аліаси зі SELECT недоступні у WHERE (виконується раніше), але доступні в ORDER BY.</div><h3>Приклад</h3><pre>SELECT d.name AS dept, COUNT(e.id) AS cnt, AVG(e.salary) AS avg_sal
FROM   departments d
JOIN   employees e ON e.dept_id = d.id
WHERE  e.active = TRUE
GROUP BY d.name
HAVING COUNT(e.id) > 5
ORDER BY avg_sal DESC
LIMIT 10;</pre>`},

{t:"Мова SQL. Запити з множинними порівняннями.",b:`<h3>Підзапити (Subqueries)</h3><p><strong>Скалярний:</strong> одне значення — у SELECT або WHERE.<br><strong>Табличний (inline view):</strong> у FROM — поводиться як таблиця.<br><strong>Корельований:</strong> посилається на зовнішній запит — виконується для кожного рядка.</p><pre>-- Корельований: зарплата вища за середню по відділу
SELECT name FROM employees e
WHERE salary > (SELECT AVG(salary) FROM employees WHERE dept_id = e.dept_id);</pre><h3>IN / NOT IN / EXISTS / NOT EXISTS</h3><pre>-- IN: чи є у множині
SELECT * FROM orders WHERE customer_id IN (SELECT id FROM vip_customers);

-- EXISTS: чи непорожній (ефективніше для великих множин)
SELECT * FROM customers c
WHERE EXISTS (SELECT 1 FROM orders o WHERE o.customer_id = c.id);</pre><h3>ANY / ALL</h3><pre>-- Більша за БУДЬ-ЯКОГО менеджера
WHERE salary > ANY (SELECT salary FROM employees WHERE role='manager')
-- Більша за ВСІХ менеджерів
WHERE salary > ALL  (SELECT salary FROM employees WHERE role='manager')</pre><h3>JOIN-типи</h3><pre>INNER JOIN  -- тільки рядки з парою
LEFT  OUTER JOIN -- всі зліва + пари справа (NULL якщо немає)
RIGHT OUTER JOIN -- всі справа
FULL  OUTER JOIN -- всі з обох
CROSS JOIN       -- декартів добуток (без ON)
self JOIN        -- таблиця сама з собою (ієрархії)</pre><h3>Множинні операції</h3><pre>SELECT name FROM employees
UNION ALL SELECT name FROM contractors;  -- з дублікатами (швидше)
INTERSECT  -- перетин
EXCEPT     -- різниця</pre>`},

{t:"Мова SQL. Вбудовані функції.",b:`<h3>Агрегатні функції</h3><pre>SELECT COUNT(*), COUNT(salary), SUM(salary),
       AVG(salary), MIN(salary), MAX(salary),
       COUNT(DISTINCT dept_id)
FROM employees WHERE active;</pre><p>NULL ігноруються (крім COUNT(*)).</p><h3>Рядкові функції</h3><pre>LENGTH('hello') = 5
UPPER / LOWER
SUBSTRING(s, pos, len)
TRIM([LEADING|TRAILING|BOTH] chars FROM s)
CONCAT(s1, s2)  або  s1 || s2
REPLACE(s, old, new)
s LIKE 'A%'        -- % = будь-яка послідовність
s LIKE '_a_'       -- рівно 3 символи</pre><h3>Числові та дата/час</h3><pre>ABS(-5)=5, ROUND(3.567,2)=3.57, FLOOR(3.9)=3, CEIL(3.1)=4
MOD(10,3)=1, POWER(2,10)=1024, SQRT(16)=4

NOW(), CURRENT_DATE
EXTRACT(YEAR FROM '2026-06-11') = 2026
date + INTERVAL '1 month'   -- PostgreSQL</pre><h3>Умовні вирази</h3><pre>CASE WHEN salary > 100000 THEN 'senior'
     WHEN salary > 50000  THEN 'mid'
     ELSE 'junior'
END
COALESCE(phone, mobile, 'немає')
NULLIF(a, b)  -- NULL якщо a=b</pre><h3>Вікнові функції (Window Functions)</h3><pre>SELECT name, salary, dept_id,
  RANK()       OVER (PARTITION BY dept_id ORDER BY salary DESC),
  SUM(salary)  OVER (PARTITION BY dept_id),
  LAG(salary, 1) OVER (ORDER BY hire_date),
  ROW_NUMBER() OVER (ORDER BY id)
FROM employees;</pre><p>На відміну від GROUP BY — не зменшують кількість рядків.</p>`},

{t:"Особливості мови QBE.",b:`<h3>QBE — Query By Example</h3><p>Мошé Злуф, IBM, 1975. Заповнення шаблонів таблиць замість тексту запиту. Базується на реляційному численні доменів.</p><h3>Основні конструкції</h3><p><strong>P. (Print):</strong> вивести значення атрибута. Змінні-приклади: підкреслений ідентифікатор (_x) — однакові змінні в різних таблицях = implicit JOIN.</p><pre>| Students | Name   | GPA  |
|          | P._n   | >3.5 |
SQL: SELECT name FROM Students WHERE gpa > 3.5

| Students   | ID   | DeptID |
|            |      | _d     |
| Departments| ID   | Name   |
|            | _d   | P._dn  |
SQL: SELECT d.name FROM Students s JOIN Departments d ON s.deptid=d.id</pre><h3>Агрегати</h3><pre>P.CNT.ALL. = COUNT(*)
P.SUM._x  = SUM(x)
UNQ.      = DISTINCT</pre><h3>Оцінка</h3><p>QBE реляційно повна. Зручна для нетехнічних користувачів і простих запитів. Складні підзапити, рекурсія — незручні або неможливі. Вплинула на Microsoft Access «Конструктор запитів».</p>`},

{t:"Функціональна залежність. Квазіключ, первинний ключ та їх знаходження.",b:`<h3>Функціональна залежність (ФЗ)</h3><p>X → Y в R: якщо два кортежі збігаються на X, вони збігаються і на Y. ФЗ — семантичне обмеження предметної області (не властивість поточних даних).</p><p>Тривіальна ФЗ: Y ⊆ X. Нетривіальна: Y ⊄ X.</p><h3>Замикання X⁺</h3><p>X⁺ — всі атрибути, функціонально залежні від X відносно F.</p><p><strong>Алгоритм:</strong> X⁺ := X; поки зміна: якщо (A→B)∈F і A⊆X⁺ → X⁺ := X⁺∪B.</p><pre>F = {A→B, BC→D, D→E}. {A,C}⁺:
Start: {A,C}
A→B: A⊆{A,C} → {A,B,C}
BC→D: BC⊆{A,B,C} → {A,B,C,D}
D→E: D⊆{A,B,C,D} → {A,B,C,D,E}
Відповідь: {A,C}⁺ = {A,B,C,D,E}</pre><h3>Ключі</h3><p><strong>Квазіключ (superkey):</strong> X: X⁺ = всі атрибути. <strong>Мінімальний ключ (candidate key):</strong> квазіключ без зайвих атрибутів. Алгоритм: атрибути не у правих частинах ФЗ — обов'язково у ключі; лише у правих — ніколи; решта — перевіряти комбінації.</p><p><strong>Первинний ключ (PK):</strong> один обраний candidate key. NOT NULL + UNIQUE. Решта → alternate keys.</p>`},

{t:"Функціонально повна залежність. 2НФ.",b:`<h3>Повна vs часткова залежність</h3><p><strong>Повна ФЗ X→Y:</strong> не існує X'⊂X: X'→Y. Прибрати будь-який атрибут з X — залежність зникає. <strong>Часткова:</strong> ∃X'⊂X: X'→Y.</p><h3>1НФ</h3><p>Всі атрибути атомарні — немає масивів, вкладених таблиць.</p><h3>2НФ</h3><p>В 1НФ і кожен неключовий атрибут <strong>повністю</strong> функціонально залежить від кожного candidate key. Актуально лише при складених ключах.</p><h3>Приклад порушення</h3><pre>Enrollment(StudentID, CourseID, Grade, StudentName, CourseName)
PK: (StudentID, CourseID)

StudentID, CourseID → Grade    -- повна ✓
StudentID → StudentName        -- часткова! порушення 2НФ
CourseID → CourseName          -- часткова! порушення 2НФ

Аномалії: якщо студент без курсу — ім'я не збережемо.
Видалення останнього запису → втрата імені студента.

Декомпозиція:
Student(StudentID, StudentName)
Course(CourseID, CourseName)
Enrollment(StudentID, CourseID, Grade)</pre>`},

{t:"Теорема Хіта (Heath).",b:`<h3>Формулювання</h3><p><strong>Теорема Хіта (1971):</strong> Нехай R(A,B,C), A∩C=∅. Якщо A→B, то декомпозиція R на R₁(A,B) і R₂(A,C) є <em>lossless (без втрат)</em>.</p><p><strong>Lossless:</strong> π_{AB}(R) ⋈ π_{AC}(R) = R — join повертає вихідне без фантомних (spurious) кортежів.</p><h3>Умова lossless (загальний випадок)</h3><p>Декомпозиція R→{R₁,R₂} lossless ⟺ (R₁∩R₂)→R₁ або (R₁∩R₂)→R₂. Теорема Хіта — частковий випадок: A→B означає A→AB (A ключ R₁).</p><h3>Приклад</h3><pre>R(A,B,C), A→B. Декомпозиція:
R1(A,B): {(1,x),(2,y)}
R2(A,C): {(1,p),(2,q)}
JOIN:  {(1,x,p),(2,y,q)} = R ✓</pre><h3>Чому важливо</h3><p>Нормалізація — послідовність lossless-декомпозицій. Кожен крок = теорема Хіта. При «lossy»-декомпозиції фантомні кортежі → некоректні дані.</p>`},

{t:"Мінімальна структура функціональних залежностей.",b:`<h3>Мінімальне покриття F_min</h3><p>Еквівалентна F (F⁺=F_min⁺) і мінімальна: одноатрибутні праві частини, без зайвих атрибутів зліва, без надлишкових ФЗ.</p><h3>Алгоритм</h3><p><strong>Крок 1. Розщеплення:</strong> X→YZ → X→Y і X→Z.</p><p><strong>Крок 2. Зайві атрибути зліва:</strong> для X→A: B∈X зайвий, якщо A∈(X\{B})⁺. Видалити B.</p><p><strong>Крок 3. Надлишкові ФЗ:</strong> X→A надлишкова, якщо A∈X⁺ у F\{X→A}. Видалити.</p><h3>Приклад</h3><pre>F = {A→B, B→C, A→C}
Крок 1: вже одноатрибутні.
Крок 3: A→C? A⁺ у F\{A→C} = {A,B,C} (A→B, B→C). C∈{A,B,C} → надлишкова.
F_min = {A→B, B→C}</pre><p>F_min не єдине, але будь-яке дозволяє синтезувати 3НФ без надлишковості зі збереженням залежностей.</p>`},

{t:"Аксіоми Армстронга.",b:`<h3>Базові аксіоми (повні і несуперечливі)</h3><p><strong>A1 — Рефлексивність:</strong> якщо Y⊆X, то X→Y. Тривіальні ФЗ.</p><p><strong>A2 — Доповнення (Augmentation):</strong> якщо X→Y, то XZ→YZ. Додавання атрибутів зберігає залежність.</p><p><strong>A3 — Транзитивність:</strong> якщо X→Y і Y→Z, то X→Z.</p><h3>Похідні правила</h3><ul><li><strong>Union:</strong> X→Y ∧ X→Z ⟹ X→YZ.</li><li><strong>Decomposition:</strong> X→YZ ⟹ X→Y і X→Z.</li><li><strong>Pseudotransitivity:</strong> X→Y ∧ WY→Z ⟹ WX→Z.</li></ul><h3>Повнота і коректність</h3><p><strong>Коректні:</strong> виводяться лише справжні ФЗ. <strong>Повні:</strong> якщо X→Y є наслідком F — виводиться через аксіоми. Це ж означає: алгоритм замикання X⁺ знаходить всі можливі ФЗ.</p><pre>Доведення Union із A1-A3:
X→Y (дано), X→Z (дано)
X→XZ (aug з X→X рефл.)
XZ→YZ (aug з X→Y)
X→YZ (trans)  ✓</pre>`},

{t:"Третя нормальна форма (3НФ) та БКНФ.",b:`<h3>Транзитивна залежність</h3><p>Z транзитивно залежить від X: X→Y і Y→Z, де Y — не суперключ, Z∉Y.</p><h3>3НФ</h3><p>В 2НФ і немає транзитивних залежностей неключових атрибутів. Або: для кожної нетривіальної X→A: (1) X — суперключ, або (2) A — ключовий атрибут (входить у candidate key).</p><pre>Employee(EmpID, DeptID, DeptName)
EmpID → DeptID (ключ)
DeptID → DeptName (DeptID — не суперключ, DeptName — неключовий)
→ транзитивна залежність! Порушення 3НФ.

Декомпозиція:
Employee(EmpID, DeptID)
Department(DeptID, DeptName)</pre><h3>БКНФ (Boyce-Codd Normal Form)</h3><p>Для кожної нетривіальної X→Y: X — суперключ. Суворіша: умова (2) 3НФ відсутня.</p><pre>R(Студент, Предмет, Викладач)
Candidate keys: (Студент, Предмет) і (Студент, Викладач)
ФЗ: Викладач → Предмет (Викладач — не суперключ!)
→ Порушення БКНФ, але не 3НФ (Предмет — ключовий атрибут).
БКНФ-декомпозиція не зберігає ФЗ Викладач→Предмет.</pre><div class="note">Для більшості схем достатньо 3НФ (зберігає ФЗ + lossless). БКНФ — коли є конкретні аномалії і можна пожертвувати збереженням залежностей.</div>`},

{t:"Стратегії розподілу даних в розподілених БД.",b:`<h3>Горизонтальна фрагментація (Sharding)</h3><p>Рядки розподіляються між вузлами за ключем шардування. Кожен вузол — підмножина рядків, всі стовпці.</p><ul><li><strong>Hash sharding:</strong> hash(key) mod N → вузол. Рівномірний розподіл, але range-запити — всі вузли.</li><li><strong>Range sharding:</strong> key∈[a,b] → вузол 1. Ефективні range-запити, але hot spots.</li><li><strong>Directory sharding:</strong> mapping key → вузол. Гнучко, але mapping — залежність.</li></ul><h3>Вертикальна фрагментація</h3><p>Стовпці між вузлами. Всі рядки + PK на кожному вузлі для JOIN. Для різних патернів доступу до стовпців.</p><h3>Реплікація</h3><ul><li><strong>Master-Slave:</strong> записи тільки через master, reads — з будь-якого. Single point of failure для записів.</li><li><strong>Multi-Master:</strong> записи на кількох → конфлікти потрібно вирішувати.</li><li><strong>Sync replication:</strong> commit після запису на всіх репліках — консистентність, але затримка.</li><li><strong>Async:</strong> commit після master → replication lag.</li></ul><h3>CAP-теорема (Брюер, 2000)</h3><p>При розділенні мережі (P) не можна одночасно: Consistency (читання = останній запис) і Availability (кожен запит отримує відповідь). Лише CP або AP. P уникнути неможливо → вибір між C і A.</p><p><strong>Consistent hashing:</strong> вузли і ключі на колі. При додаванні/видаленні вузла переміщується 1/N ключів.</p>`},

{t:"Багатозначні залежності. 4НФ. Теорема Фейджіна.",b:`<h3>Багатозначна залежність (MVD)</h3><p>X ↠ Y у R(X,Y,Z): значення Y не залежать від Z при фіксованому X. Формально: якщо (x,y₁,z₁)∈R і (x,y₂,z₂)∈R, то (x,y₁,z₂)∈R і (x,y₂,z₁)∈R.</p><pre>Course(CourseID, Teacher, Textbook)
Курс має незалежні множини викладачів і підручників.
CourseID ↠ Teacher  і  CourseID ↠ Textbook

(C1,T1,B1) і (C1,T2,B2) → обов'язково (C1,T1,B2) і (C1,T2,B1)
→ надлишковість при вставці!</pre><h3>4НФ</h3><p>В БКНФ і немає нетривіальних MVD (де X — не суперключ).</p><pre>Декомпозиція:
CourseTeacher(CourseID, Teacher)
CourseTextbook(CourseID, Textbook)  ← 4НФ</pre><h3>Теорема Фейджіна (1977)</h3><p>R(A,B,C) можна lossless розкласти на R₁(A,B) і R₂(A,C) <strong>тоді і тільки тоді</strong>, коли A↠B або A↠C.</p><p>Узагальнення теореми Хіта: кожна ФЗ A→B породжує MVD A↠B → теорема Хіта є наслідком теореми Фейджіна.</p>`},

{t:"Об'єктно-орієнтовані бази даних.",b:`<h3>Impedance Mismatch</h3><p>Реляційні СУБД — плоскі таблиці. OO-програми — складні об'єкти з методами, успадкуванням, посиланнями. «Переклад» між ними — дорогий, складний.</p><h3>ООБД</h3><p>Зберігають об'єкти мови безпосередньо. OID (Object Identity) — унікальний незмінний ідентифікатор, незалежний від значень. Класи, успадкування, методи, навігаційний доступ через посилання. Приклади: db4o, ObjectDB, Objectivity/DB. Стандарт: ODMG.</p><p><strong>Переваги:</strong> немає impedance mismatch, природно для CAD/GIS/мультимедіа. <strong>Недоліки:</strong> менша стандартизація, складніші ad-hoc запити, менша поширеність.</p><h3>Об'єктно-реляційні СУБД (ORDBMS)</h3><p>PostgreSQL, Oracle — розширення реляційної моделі:</p><pre>CREATE TYPE address AS (street TEXT, city TEXT, zip VARCHAR(10));
CREATE TABLE person (id SERIAL, name TEXT, addr address);
SELECT (addr).city FROM person WHERE id=1;</pre><p>PostgreSQL: успадкування таблиць (INHERITS), JSONB з GIN-індексами, масиви, PostGIS.</p><h3>ORM</h3><p>Hibernate (Java), SQLAlchemy (Python), Entity Framework (.NET) — прошарок між об'єктами і SQL. Проблеми: N+1 queries, lazy loading у закритій сесії.</p>`},

{t:"Бази даних та бази знань.",b:`<h3>БД vs БЗн</h3><p><strong>БД:</strong> зберігає факти. Відповідає лише на запити про явно збережені дані. Closed World Assumption: відсутній факт = хибний. Пасивна.</p><p><strong>БЗн:</strong> факти + правила виведення + метазнання. Механізм виведення (inference engine) отримує нові факти без явного збереження. Open World Assumption (у деяких системах).</p><h3>Компоненти БЗн</h3><ul><li><strong>База фактів:</strong> конкретні факти предметної області.</li><li><strong>База правил:</strong> загальні закономірності (якщо... то...).</li><li><strong>Inference engine:</strong> forward chaining (від фактів до висновків) або backward chaining (від мети назад).</li><li><strong>Пояснювальна підсистема:</strong> «чому» цей висновок.</li></ul><h3>Приклад (Prolog)</h3><pre>parent(tom, bob).
parent(bob, ann).
grandparent(X, Z) :- parent(X, Y), parent(Y, Z).
?- grandparent(tom, ann).  % yes — виведення без явного факту!</pre><p>Системи: Prolog, CLIPS, DROOLS, OWL reasoners (HermiT, Pellet).</p>`},

{t:"Моделі представлення знань в базах знань.",b:`<h3>Логічна модель (Horn Clauses)</h3><p>Знання — формули логіки предикатів. Horn clause: H ← B₁∧B₂∧…∧Bₙ. Inference: SLD-resolution (Prolog). Переваги: формальна семантика, точний вивід. Недоліки: складне управління невизначеністю, неефективно на великих БД.</p><h3>Продукційні правила</h3><p>ЯКЩО &lt;умова&gt; ТО &lt;дія&gt;. Природні, легко пояснити. Forward chaining: від фактів до висновків (Rete algorithm — ефективна реалізація). Backward chaining: від мети до фактів. Класика: MYCIN, XCON, CLIPS, DROOLS.</p><h3>Семантичні мережі</h3><p>Граф: вузли = концепти, дуги = відношення (is-a, part-of, has-attribute). Наочні, успадкування через is-a. Недолік: нечітка семантика, складно виражати логічні умови.</p><h3>Фрейми (Minsky, 1974)</h3><p>Структурований опис: слоти (атрибути) з типами, defaults, процедурами-даймонами (if-needed: обчислити; if-added: викликати при зміні). Ієрархія з успадкуванням. Прообраз ООП в AI.</p><h3>Онтології</h3><p>Формальний явний опис предметної: класи, властивості, обмеження, аксіоми. Стандарти W3C:</p><ul><li><strong>RDF:</strong> граф триплетів (суб'єкт, предикат, об'єкт).</li><li><strong>OWL:</strong> Description Logics, reasoners (HermiT, Pellet) — автоматична класифікація, перевірка узгодженості.</li></ul><p>Застосування: Google Knowledge Graph, Wikidata, SNOMED CT, Gene Ontology, Semantic Web.</p>`}

let activeTab=0, openIdx={};
function renderSection(sec,idx){
  const el=document.getElementById('sec'+idx);
  el.innerHTML='';
  sec.forEach((q,qi)=>{
    const key=idx+'_'+qi, isOpen=!!openIdx[key];
    const d=document.createElement('div');
    d.className='q-block';
    d.innerHTML=`<div class="q-head" onclick="toggle(${idx},${qi})">
      <span class="q-num">${qi+1}.</span>
      <span class="q-title">${q.t}</span>
      <span class="arrow ${isOpen?'open':''}">&#9654;</span>
    </div>
    <div class="q-body ${isOpen?'open':''}">${q.b}</div>`;
    el.appendChild(d);
  });
}
function toggle(si,qi){const key=si+'_'+qi;openIdx[key]=!openIdx[key];renderSection(data[si],si);}
function switchTab(idx){
  activeTab=idx;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.section').forEach((s,i)=>s.classList.toggle('active',i===idx));
  document.getElementById('search').value='';
}
function expandAll(){data[activeTab].forEach((_,qi)=>{openIdx[activeTab+'_'+qi]=true;});renderSection(data[activeTab],activeTab);}
function collapseAll(){data[activeTab].forEach((_,qi)=>{openIdx[activeTab+'_'+qi]=false;});renderSection(data[activeTab],activeTab);}
function doSearch(v){
  v=v.trim().toLowerCase();
  document.querySelectorAll('.section').forEach((s,si)=>{
    if(!v){s.classList.toggle('active',si===activeTab);renderSection(data[si],si);return;}
    s.classList.add('active');s.innerHTML='';let found=0;
    data[si].forEach((item,qi)=>{
      if((item.t+' '+item.b).replace(/<[^>]+>/g,' ').toLowerCase().includes(v)){
        found++;
        const key=si+'_'+qi,isOpen=!!openIdx[key];
        const d=document.createElement('div');d.className='q-block';
        d.innerHTML=`<div class="q-head" onclick="toggle(${si},${qi})"><span class="q-num">${qi+1}.</span><span class="q-title">${item.t}</span><span class="arrow ${isOpen?'open':''}">&#9654;</span></div><div class="q-body ${isOpen?'open':''}">${item.b}</div>`;
        s.appendChild(d);
      }
    });
    if(!found)s.innerHTML='<p class="no-results">Нічого не знайдено.</p>';
  });
  if(!v)document.querySelectorAll('.section').forEach((s,i)=>s.classList.toggle('active',i===activeTab));
}
data.forEach((sec,idx)=>renderSection(sec,idx));
</script>
